name: Data

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@53eebbd14260dee1115ba668eba3d135230aa3ad # v1.0.9
      - run: bun run data:check-schema

  prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@53eebbd14260dee1115ba668eba3d135230aa3ad # v1.0.9
      - run: bun run data:check-prose
