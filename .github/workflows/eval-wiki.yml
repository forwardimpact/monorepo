name: "Eval: Wiki"

on:
  workflow_dispatch:

concurrency:
  group: eval-wiki-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@2bebda7abaffe16b79a6a5c4e3e82eddc1f7c7d1 # v1.0.7
        with:
          # fit-benchmark runs the benchmark binary straight off PATH.
          clis: fit-benchmark
      - uses: forwardimpact/benchmark@66b7dad6715d32d64bdc81614cd7b2edad9b1cae # v1.0.3
        with:
          family: ./benchmarks/fit-wiki
          runs: "5"
          max-turns: "25"
          judge-profile: judge
          # Use the full GitHub-hosted job budget (360 min is the hard
          # per-job ceiling) so a stalled agent run cannot exhaust a tighter
          # cap mid-run (see eval-kata run 27922619997).
          timeout-minutes: "360"
