name: "Eval: Wiki"

on:
  workflow_dispatch:

concurrency:
  group: eval-wiki-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@52b7f3fe405a559fd8f2c95b102499e0df9b152b # v1.0.10
        with:
          # fit-benchmark runs the benchmark binary straight off PATH.
          clis: fit-benchmark
      - uses: forwardimpact/benchmark@f0ed6cd1bd94ba00a494a19d8c8d858b68cbefd2 # v1.0.4
        with:
          family: ./benchmarks/fit-wiki
          runs: "5"
          max-turns: "25"
          judge-profile: judge
          # Use the full GitHub-hosted job budget (360 min is the hard
          # per-job ceiling) so a stalled agent run cannot exhaust a tighter
          # cap mid-run (see eval-kata run 27922619997).
          timeout-minutes: "360"
