name: "Eval: Wiki"

on:
  workflow_dispatch:

concurrency:
  group: eval-wiki-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@a5d9098c2a1e68277f02fad39583a34ee003d9c9 # v1.0.18
        with:
          # gemba-benchmark runs the benchmark binary straight off PATH.
          clis: gemba-benchmark
      - uses: forwardimpact/benchmark@9cf5ddb6f86afa13931bd204addd14e4517aa4a9 # v1.0.6
        with:
          family: ./benchmarks/fit-wiki
          runs: "5"
          max-turns: "25"
          judge-profile: judge
          # Use the full GitHub-hosted job budget (360 min is the hard
          # per-job ceiling) so a stalled agent run cannot exhaust a tighter
          # cap mid-run (see eval-kata run 27922619997).
          timeout-minutes: "360"
