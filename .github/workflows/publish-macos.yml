name: "Publish: macOS App"

# Chained off "Publish: Brew", which builds, signs, notarizes, and staples the
# fit-outpost.app exactly once. This workflow reuses that bundle to produce the
# .pkg installer, so the binary and the app are built and notarized a single
# time per release (this job only wraps + signs + notarizes the .pkg).
on:
  workflow_run:
    workflows: ["Publish: Brew"]
    types: [completed]

permissions:
  contents: read

jobs:
  pkg:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-14

    # Environment-scoped signing secrets — only jobs that declare this
    # environment can read them, so kata-* agent workflows cannot.
    environment: macos-signing

    permissions:
      contents: write # upload the .pkg to the release
      actions: read # download the brew run's artifact

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # The brew workflow runs for every product; only an outpost release
      # uploads this artifact. Its presence (not the tag, which is null on
      # workflow_run for tag pushes) is the gate.
      - name: Check for an outpost release artifact
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          FOUND=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name=="fit-outpost-app-stapled")] | length')
          if [ "$FOUND" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No fit-outpost release artifact in this brew run — skipping."
          fi

      - name: Download the signed + notarized app
        if: steps.gate.outputs.found == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fit-outpost-app-stapled
          path: products/outpost/dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Resolve version and unpack the app
        id: meta
        if: steps.gate.outputs.found == 'true'
        working-directory: products/outpost
        run: |
          set -euo pipefail
          ZIP=$(ls dist/fit-outpost-*-darwin-arm64.zip)
          BASE=$(basename "$ZIP")
          VERSION=${BASE#fit-outpost-}; VERSION=${VERSION%-darwin-arm64.zip}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=outpost@v$VERSION" >> "$GITHUB_OUTPUT"
          # ditto -x restores codesign metadata a plain unzip would corrupt.
          ditto -x -k "$ZIP" dist/
          test -d dist/fit-outpost.app

      - name: Set up installer signing
        id: signing
        if: steps.gate.outputs.found == 'true'
        uses: ./.github/actions/macos-signing
        with:
          installer-cert-base64: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_BASE64 }}
          installer-cert-password: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_PASSWORD }}

      - name: Build the .pkg from the signed app
        if: steps.gate.outputs.found == 'true'
        working-directory: products/outpost
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        # Wraps the already-signed + stapled dist/fit-outpost.app — no rebuild.
        run: bash pkg/macos/build-pkg.sh dist "$VERSION"

      - name: Notarize and staple pkg
        if: steps.gate.outputs.found == 'true' && steps.signing.outputs.enabled == 'true'
        working-directory: products/outpost
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          API_KEY_B64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          PKG="dist/fit-outpost-${VERSION}.pkg"
          KEY="$RUNNER_TEMP/api_key.p8"
          printf '%s' "$API_KEY_B64" | base64 --decode > "$KEY"
          xcrun notarytool submit "$PKG" \
            --key "$KEY" --key-id "$API_KEY_ID" --issuer "$API_ISSUER" --wait
          xcrun stapler staple "$PKG"
          rm -f "$KEY"

      - name: Verify .pkg exists
        if: steps.gate.outputs.found == 'true'
        working-directory: products/outpost
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          PKG_FILE="dist/fit-outpost-${VERSION}.pkg"
          if [ ! -f "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE not found"; ls -la dist/; exit 1
          fi
          echo "Built: $PKG_FILE ($(du -h "$PKG_FILE" | cut -f1))"

      - name: Upload .pkg to the release
        if: steps.gate.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gh release upload "$TAG" \
            "products/outpost/dist/fit-outpost-${VERSION}.pkg" \
            --clobber
