name: "Publish: macOS App"

on:
  push:
    tags: ["outpost@v*"]

permissions:
  contents: read

jobs:
  binaries:
    permissions:
      contents: read
    uses: ./.github/workflows/build-binaries.yml
    with:
      targets: '["bun-darwin-arm64"]'

  build:
    needs: binaries
    runs-on: macos-14

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Extract version from tag
        id: meta
        run: |
          # Tag format: outpost@v1.2.3
          VERSION="${GITHUB_REF_NAME#*@v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - uses: forwardimpact/fit-bootstrap@22e7a8a053c22cf56d6f4efb95fcf0b3d42267c8 # v1

      - uses: ./.github/actions/audit

      - name: Run tests
        run: bun run test

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fit-outpost-bun-darwin-arm64
          path: products/outpost/dist   # workspace-root-relative → products/outpost/dist/fit-outpost

      - name: Build .pkg installer
        working-directory: products/outpost
        run: |
          chmod +x dist/fit-outpost   # upload-artifact dropped the +x bit
          bun pkg/build.js --pkg      # launcher + .app + .pkg; consumes dist/fit-outpost, no scheduler compile

      - name: Verify .pkg exists
        working-directory: products/outpost
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          PKG_FILE="dist/fit-outpost-${VERSION}.pkg"
          if [ ! -f "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE not found"
            ls -la dist/
            exit 1
          fi
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "Built: $PKG_FILE ($(du -h "$PKG_FILE" | cut -f1))"
        id: verify

      # Publish: Brew fires on the same `outpost@v*` tag and races on
      # `gh release create`. Split create from upload and treat create as
      # idempotent, mirroring publish-brew.yml, so whichever workflow wins
      # the race the other still uploads its asset to the existing release.
      - name: Create or reuse GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "Outpost $VERSION" \
            --generate-notes 2>/dev/null \
            || echo "Release $TAG already exists"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          PKG_FILE: ${{ steps.verify.outputs.pkg_file }}
        run: |
          gh release upload "$TAG" \
            "products/outpost/$PKG_FILE" \
            --clobber
