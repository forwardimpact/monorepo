name: "Publish: Native CLI"

# Raw-binary release channel for null-bundle CLIs — the ones that ship as a
# standalone native binary, not inside a signed .app (publish-binaries.yml
# owns the bundled, signed, notarized products). fit-wiki is the first: it is
# a bin of @forwardimpact/libwiki with no product app, so it has nowhere to
# ride. This pipeline builds the two release targets and uploads the bare
# binary + checksum to the tag's GitHub release, with no signing step.
#
# A future null-bundle CLI folds in by adding its `<name>@v*` tag below; the
# tag stem maps to fit-<name> via the meta job.
on:
  push:
    tags:
      - "wiki@v*"

permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.m.outputs.cli }}
      version: ${{ steps.m.outputs.version }}
    steps:
      - id: m
        run: |
          NAME="${GITHUB_REF_NAME%%@v*}"
          VERSION="${GITHUB_REF_NAME#*@v}"
          {
            echo "cli=fit-${NAME}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
          - target: bun-darwin-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@a007a6b9a1fa0db8527b7e29c158db3cf2c96c92 # v1
      - name: Ensure codegen is current
        run: just codegen
      - name: Compile
        run: just build-binary "${{ needs.meta.outputs.cli }}" "${{ matrix.target }}"
      - name: Smoke gate
        run: |
          BIN="dist/binaries/${{ needs.meta.outputs.cli }}"
          OUT="$("$BIN" --help 2>&1)"
          test -n "$OUT" || { echo "::error::${{ needs.meta.outputs.cli }} produced no output"; exit 1; }
      - name: Checksum
        run: shasum -a 256 "dist/binaries/${{ needs.meta.outputs.cli }}" | awk '{print $1}' > "dist/binaries/${{ needs.meta.outputs.cli }}.sha256"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "${{ needs.meta.outputs.cli }}-${{ matrix.target }}"
          path: |
            dist/binaries/${{ needs.meta.outputs.cli }}
            dist/binaries/${{ needs.meta.outputs.cli }}.sha256
          if-no-files-found: error

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/artifacts
      - name: Stage raw binary assets
        run: |
          set -euo pipefail
          mkdir -p dist/release
          # Per-target artifacts are named {cli}-{target} and each holds a bare
          # {cli} + {cli}.sha256; re-emit each with the target in the asset name.
          for dir in dist/artifacts/*/; do
            key="$(basename "$dir")"
            bin="$(find "$dir" -maxdepth 1 -type f ! -name '*.sha256')"
            test -n "$bin" || { echo "::error::artifact $key has no binary"; exit 1; }
            install -m 0755 "$bin" "dist/release/$key"
            cp "$bin.sha256" "dist/release/$key.sha256"
          done
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes 2>/dev/null \
            || echo "Release $GITHUB_REF_NAME already exists"
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber dist/release/*
