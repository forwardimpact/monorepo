name: "Publish: Native"

on:
  push:
    # Product release tags. publish-native builds every native binary once and
    # publishes them as release assets; publish-brew (on release:published) and
    # publish-macos (chained off brew) consume them — neither compiles a binary.
    tags:
      - "outpost@v*"
      - "guide@v*"
      - "landmark@v*"
      - "map@v*"
      - "pathway@v*"
      - "summit@v*"
      - "gear@v*"

permissions:
  contents: read

jobs:
  binaries:
    permissions:
      contents: read
    uses: ./.github/workflows/build-binaries.yml
    with:
      targets: '["bun-linux-x64", "bun-darwin-arm64"]'

  release:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: forwardimpact/fit-bootstrap@v1

      - uses: ./.github/actions/audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/artifacts
      - name: Stage per-target release assets
        run: |
          # Each artifact is named {cli}-{target} but, rooted at the upload's
          # common ancestor (dist/binaries), holds a bare {cli} + {cli}.sha256.
          # `merge-multiple` would flatten both targets' identically-named files
          # into one path (last-write-wins), so download per-artifact and re-emit
          # each with the target in the asset filename — one addressable binary
          # plus checksum per CLI-per-target. upload-artifact drops the POSIX
          # executable bit, so `install -m 0755` restores it (the `.sha256`
          # siblings stay non-executable text).
          mkdir -p dist/release
          for dir in dist/artifacts/*/; do
            key=$(basename "$dir")   # {cli}-{target}, the addressable asset name
            bin=$(find "$dir" -maxdepth 1 -type f ! -name '*.sha256')
            test -n "$bin" || { echo "::error::artifact $key has no binary"; exit 1; }
            install -m 0755 "$bin" "dist/release/$key"
            cp "$bin.sha256" "dist/release/$key.sha256"
          done
      # Create the release with an App token, not GITHUB_TOKEN: releases authored
      # by GITHUB_TOKEN do not trigger other workflows, so publish-brew's
      # release:published trigger would never fire.
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      # Create the release as a draft, upload the binaries, then publish last.
      # release:published — which triggers publish-brew.yml — fires only after
      # the assets exist, so brew never sees an asset-less release and cannot
      # race the upload.
      - name: Publish release with native binaries
        env:
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes --draft 2>/dev/null \
            || echo "Draft release $GITHUB_REF_NAME already exists"
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber dist/release/*
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
