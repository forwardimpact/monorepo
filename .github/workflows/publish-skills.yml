name: "Publish: Skills"

on:
  push:
    branches: [main]
    paths:
      - ".claude/skills/fit-*/**"
      - ".claude/skills/gemba*/**"
      - ".claude/skills/kata-*/**"
      - ".claude/skills/jidoka-*/**"
      - ".claude/skills/monorepo-*/**"
      - ".claude/agents/*.md"
      - "products/outpost/templates/.claude/skills/**"
      - "products/outpost/templates/.claude/agents/*.md"
      - "products/gear/package.json"
      - "products/outpost/package.json"
      - "products/jidoka/package.json"
      - ".github/actions/publish-skill-pack/**"
      - ".github/workflows/publish-skills.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # One job body, three packs. Each pack syncs its skills (kata also its agents)
  # into the matching sibling repo, regenerates apm.yml + README.md, and tags at
  # the pack's package version. Add or retire a pack by editing one matrix entry;
  # the shared mechanics live in ./.github/actions/publish-skill-pack.
  publish:
    name: ${{ matrix.pack.repo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pack:
          # The fit leg carries two prefixes: the fit-* skills plus the gemba
          # product and gemba-* capability skills ship in the same fit-skills
          # pack. Requires a bootstrap pin whose fit-pack accepts repeated
          # --prefix flags (gear@v0.2.0+).
          - prefix: fit gemba
            repo: fit-skills
            version-file: products/gear/package.json
            sync-agents: "false"
            readme-title: Forward Impact Skills
            readme-intro: >-
              Agent skills for the [Forward Impact](https://forwardimpact.team)
              engineering standard.
            apm-description: >-
              Agent skills for the Forward Impact engineering standard.
          - prefix: jidoka
            repo: jidoka-skills
            version-file: products/jidoka/package.json
            sync-agents: "false"
            readme-title: Jidoka Skills
            readme-intro: >-
              Skills for maintaining the
              [Jidoka](https://github.com/forwardimpact/monorepo/blob/main/JIDOKA.md)
              instruction architecture with the `jidoka` CLI (installed via
              `npx @forwardimpact/jidoka` or the platform bootstrap). Renamed
              from `coaligned-skills` — migrate with `git mv .coaligned
              .jidoka`, reinstall this pack, and swap the CLI name.
            apm-description: >-
              Skills for maintaining the Jidoka instruction architecture —
              setup, instruction layers, jobs, invariants, and the check suite
              that stops the line the moment a layer drifts.
          - prefix: kata
            repo: kata-skills
            version-file: products/gear/package.json
            sync-agents: "true"
            readme-title: Kata Skills
            readme-intro: >-
              Agents and skills for the [Forward Impact](https://forwardimpact.team)
              Kata Agent Team.
            apm-description: >-
              Forward Impact Kata Agent Team — domain agents and skills for the
              spec → design → plan → implement workflow, releases, security, and
              product-issue triage.
          - prefix: monorepo
            repo: monorepo-skills
            version-file: products/gear/package.json
            sync-agents: "false"
            readme-title: Monorepo Skills
            readme-intro: >-
              Skills for standing up and maintaining a
              [Forward Impact](https://forwardimpact.team)-style monorepo — the
              cross-cutting setup that composes the Co-Aligned and Kata packs.
            apm-description: >-
              Skills for bootstrapping a Forward Impact-style monorepo end to
              end — repository structure, instruction architecture, and the Kata
              Agent Team — composing the Co-Aligned and Kata packs.
          # Outpost is a product-local pack: its skills and agents live under
          # the installation template, not repo-root .claude, and its skills
          # share no common prefix — the directory itself is the pack boundary,
          # so it stages with `all: "true"` instead of a prefix.
          - prefix: ""
            repo: outpost-skills
            version-file: products/outpost/package.json
            source-dir: products/outpost/templates/.claude
            all: "true"
            sync-agents: "true"
            readme-title: Outpost Skills
            readme-intro: >-
              Agents and skills for [Outpost](https://forwardimpact.team), the
              personal chief-of-staff that tracks people, projects, and threads.
            apm-description: >-
              Outpost agents and skills — the chief-of-staff, concierge,
              librarian, postman, and recruiter agents plus the skills they run
              to sync, triage, and brief.
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.pack.repo }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: forwardimpact/${{ matrix.pack.repo }}
          token: ${{ steps.ci-app.outputs.token }}
          path: skills-repo
          fetch-depth: 0

      - uses: ./.github/actions/audit
        with:
          vulnerability-scanning: "false"
          secret-scanning: "true"

      - uses: forwardimpact/bootstrap@71bd75533e5bc5f3046004839ab1b1c36261b033 # v1.0.17
        with:
          clis: fit-pack

      - name: Publish skill pack
        uses: ./.github/actions/publish-skill-pack
        with:
          pack-prefix: ${{ matrix.pack.prefix }}
          source-dir: ${{ matrix.pack.source-dir }}
          all: ${{ matrix.pack.all }}
          sibling-repo: ${{ matrix.pack.repo }}
          version-file: ${{ matrix.pack.version-file }}
          apm-description: ${{ matrix.pack.apm-description }}
          readme-title: ${{ matrix.pack.readme-title }}
          readme-intro: ${{ matrix.pack.readme-intro }}
          sync-agents: ${{ matrix.pack.sync-agents }}
          app-id: ${{ secrets.KATA_APP_ID }}
