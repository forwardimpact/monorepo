name: "Package: macOS"

# Reusable: assemble + sign + notarize the .app and (outpost) the .pkg on one
# macOS runner, reusing the same signed bundle. Called per release tag by
# publish-binaries.yml. Platform and architecture are matrix data — the sole
# `arch: arm64` cell today is byte-identical to the former inline job; a future
# macOS x64 target is one more matrix value, not new code.
on:
  workflow_call:
    inputs:
      bundle:
        type: string
        required: true
      version:
        type: string
        required: true
      bundle_name:
        type: string
        required: true
      cask:
        type: string
        required: true

permissions:
  contents: read

jobs:
  package:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
    # Environment-scoped signing secrets — only jobs that declare this
    # environment can read them, so kata-* agent workflows cannot. Declared
    # inside the reusable workflow so the scoping travels with the job.
    environment: macos-signing
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: forwardimpact/bootstrap@ccdf5ac74abf2a47f7a1f9af4b06c6ac7444d0d6 # v1.0.14

      - uses: ./.github/actions/audit

      - name: Download macOS binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-bun-darwin-${{ matrix.arch }}"
          path: dist/dl
          # Merge every matched artifact into dist/dl as bare {cli} +
          # {cli}.sha256 (no per-artifact subdir). Deterministic for 1 CLI
          # (outpost) or 25 (gear) — names don't collide.
          merge-multiple: true

      - name: Verify checksums and stage binaries
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist/binaries
          # The .sha256 sibling holds only the hash (build-binaries emits
          # `shasum | awk '{print $1}'`), so compare rather than `shasum -c`.
          # Verifying before signing proves the bytes we sign are the bytes the
          # build produced.
          found=0
          for sha in dist/dl/*.sha256; do
            bin="${sha%.sha256}"
            test -f "$bin" || { echo "::error::$sha has no matching binary"; exit 1; }
            want="$(cat "$sha")"
            got="$(shasum -a 256 "$bin" | awk '{print $1}')"
            [ "$want" = "$got" ] || { echo "::error::checksum mismatch for $bin"; exit 1; }
            install -m 0755 "$bin" "dist/binaries/$(basename "$bin")"
            found=$((found + 1))
          done
          [ "$found" -gt 0 ] || { echo "::error::no binaries downloaded to dist/dl"; exit 1; }

      - name: Set up code signing
        id: signing
        uses: ./.github/actions/macos-signing
        with:
          app-cert-base64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          app-cert-password: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          installer-cert-base64: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_BASE64 }}
          installer-cert-password: ${{ secrets.APPLE_DEV_ID_INSTALLER_P12_PASSWORD }}

      - name: Assemble bundle
        env:
          BUNDLE: ${{ inputs.bundle }}
        run: just build-app "$BUNDLE"

      - name: Smoke test
        env:
          BUNDLE: ${{ inputs.bundle }}
          BUNDLE_NAME: ${{ inputs.bundle_name }}
        run: |
          APP="dist/apps/${BUNDLE_NAME}"
          codesign --verify --deep --strict "$APP"
          # Smoke every CLI the manifest assigns to this bundle, not just the
          # first — a single startup-crash binary would otherwise ship signed.
          # A single-CLI product runs the loop once; gear runs it ~29 times.
          # Server entries honour --help via the libcli short-circuit, so they
          # are smoked alongside the rest with no carve-out.
          for cli in $(jq -r --arg b "$BUNDLE" '.clis[] | select(.bundle == $b) | .name' build/cli-manifest.json); do
            "$APP/Contents/MacOS/$cli" --help >/dev/null
          done

      - name: Verify cdhash stability
        # Rebuild from the same (already checksum-verified) binaries and confirm
        # the signed cdhash is identical. A drifting cdhash wipes TCC grants on
        # `brew upgrade`, so a non-deterministic wrap must fail the release.
        env:
          BUNDLE: ${{ inputs.bundle }}
          BUNDLE_NAME: ${{ inputs.bundle_name }}
        run: |
          BUNDLE_PATH="dist/apps/${BUNDLE_NAME}"
          BASELINE=$(codesign -dvvv "$BUNDLE_PATH" 2>&1 | grep -i CDHash || true)
          rm -rf dist/apps products/outpost/dist   # keep dist/binaries
          just build-app "$BUNDLE"
          AFTER=$(codesign -dvvv "$BUNDLE_PATH" 2>&1 | grep -i CDHash || true)
          if [ "$BASELINE" != "$AFTER" ]; then
            echo "::error::cdhash drift detected — bundle is not deterministic"
            echo "baseline: $BASELINE"; echo "after: $AFTER"; exit 1
          fi
          echo "cdhash stable: $AFTER"

      - name: Notarize and staple app
        if: steps.signing.outputs.enabled == 'true'
        uses: ./.github/actions/notarize
        with:
          path: dist/apps/${{ inputs.bundle_name }}
          api-key-base64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-issuer: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Verify app is signed, notarized, and stapled
        if: steps.signing.outputs.enabled == 'true'
        env:
          BUNDLE_NAME: ${{ inputs.bundle_name }}
        run: |
          set -euo pipefail
          BUNDLE="dist/apps/${BUNDLE_NAME}"
          codesign --verify --deep --strict --verbose=2 "$BUNDLE"
          # Gatekeeper assessment + stapled ticket — the .pkg must never wrap an
          # un-notarized app.
          spctl --assess --type exec --verbose=4 "$BUNDLE"
          xcrun stapler validate "$BUNDLE"

      - name: Zip cask and hash
        id: hash
        env:
          VERSION: ${{ inputs.version }}
          CASK: ${{ inputs.cask }}
          BUNDLE_NAME: ${{ inputs.bundle_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          BUNDLE="dist/apps/${BUNDLE_NAME}"
          ASSET="${CASK}-${VERSION}-darwin-${ARCH}.zip"
          mkdir -p dist/release
          # ditto preserves codesign metadata through zip; a plain zip does not.
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "dist/release/${ASSET}"
          shasum -a 256 "dist/release/${ASSET}" | awk '{print $1}' > "dist/release/${ASSET}.sha256"

      - name: Build .pkg
        if: inputs.bundle == 'outpost'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Wrap the same signed + notarized + stapled app built above — no
          # rebuild, no re-download. build-pkg.sh signs the .pkg with the
          # installer identity (MACOS_INSTALLER_IDENTITY) when set.
          bash products/outpost/pkg/macos/build-pkg.sh "$PWD/dist/apps" "$VERSION"
          cp "dist/apps/fit-outpost-${VERSION}.pkg" dist/release/

      - name: Notarize and staple .pkg
        if: inputs.bundle == 'outpost' && steps.signing.outputs.enabled == 'true'
        uses: ./.github/actions/notarize
        with:
          path: dist/release/fit-outpost-${{ inputs.version }}.pkg
          api-key-base64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-issuer: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Upload release-bound package assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-assets
          path: dist/release/
          if-no-files-found: error
          retention-days: 1
