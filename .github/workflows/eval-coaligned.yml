name: "Eval: Co-Aligned"

on:
  workflow_dispatch:

concurrency:
  group: eval-coaligned-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fan the coaligned-skills family (2 tasks × runs:5 = 10 cells) across
  # machines via the benchmark reusable workflow, then merge the shard ledgers
  # into one pass@k. One shard per task keeps each machine's run small. This
  # caller only picks the family and shard count; the filesystem work-tracker is
  # the reusable workflow's env contract.
  benchmark:
    uses: forwardimpact/benchmark/.github/workflows/benchmark.yml@f0ed6cd1bd94ba00a494a19d8c8d858b68cbefd2 # v1.0.4
    with:
      family: ./benchmarks/coaligned-skills
      runs: "5"
      max-turns: "30"
      judge-profile: judge
      shard-total: "2"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
