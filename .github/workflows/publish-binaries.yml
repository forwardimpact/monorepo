name: "Publish: Binaries"

# One pipeline per product release tag (outpost@v*, guide@v*, …, gear@v*).
# Builds the bundle's native binaries once, publishes them on the GitHub
# release, then signs + notarizes the .app and (for outpost) the .pkg on a
# single macOS runner, and updates the Homebrew tap. Everything runs on the tag
# ref in one observable run; a mid-pipeline failure fails the release visibly.
# Generic: a future cask product folds in by adding its tag below.
on:
  push:
    tags:
      - "outpost@v*"
      - "guide@v*"
      - "landmark@v*"
      - "map@v*"
      - "pathway@v*"
      - "summit@v*"
      - "gear@v*"

permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.m.outputs.version }}
      bundle: ${{ steps.m.outputs.bundle }}
      bundle_name: ${{ steps.m.outputs.bundle_name }}
      cask: ${{ steps.m.outputs.cask }}
    steps:
      - id: m
        run: |
          # The tag prefix is the bundle for every product and for gear alike;
          # no per-kind branch — bundle_name and cask derive uniformly.
          BUNDLE="${GITHUB_REF_NAME%%@v*}"
          VERSION="${GITHUB_REF_NAME#*@v}"
          {
            echo "version=${VERSION}"
            echo "bundle=${BUNDLE}"
            echo "bundle_name=fit-${BUNDLE}.app"
            echo "cask=fit-${BUNDLE}"
          } >> "$GITHUB_OUTPUT"

  # Build only the tagged bundle's CLIs (both targets), once. Each is run inside
  # the build and uploaded with a checksum.
  binaries:
    needs: meta
    permissions:
      contents: read
    uses: ./.github/workflows/build-binaries.yml
    with:
      targets: '["bun-linux-x64", "bun-linux-arm64", "bun-darwin-arm64"]'
      bundle: ${{ needs.meta.outputs.bundle }}

  # Assemble + sign + notarize the .app and (outpost) the .pkg. Delegated to a
  # reusable workflow matrixed over arch; emits the `package-assets` artifact.
  # secrets: inherit forwards the macos-signing environment secrets, which the
  # reusable workflow's job scopes with `environment: macos-signing`.
  package-macos:
    needs: [meta, binaries]
    uses: ./.github/workflows/package-macos.yml
    with:
      bundle: ${{ needs.meta.outputs.bundle }}
      version: ${{ needs.meta.outputs.version }}
      bundle_name: ${{ needs.meta.outputs.bundle_name }}
      cask: ${{ needs.meta.outputs.cask }}
    secrets: inherit

  # Pack the bundle's Linux binaries into one tarball per architecture. Runs in
  # parallel with `package-macos`; emits the linux-packages-<arch> artifacts.
  package-linux:
    needs: [meta, binaries]
    uses: ./.github/workflows/package-linux.yml
    with:
      bundle: ${{ needs.meta.outputs.bundle }}
      version: ${{ needs.meta.outputs.version }}

  # Publish the GitHub release with the raw binaries + cask zip (+ pkg).
  # Created with GITHUB_TOKEN: this is one workflow, so nothing downstream needs
  # the release event to fire.
  release:
    needs: [meta, binaries, package-macos, package-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/artifacts

      - name: Stage raw binary assets
        run: |
          set -euo pipefail
          mkdir -p dist/release
          # Per-target artifacts are named {cli}-{target} and hold a bare {cli} +
          # {cli}.sha256; re-emit each with the target in the asset name. The
          # package artifacts (cask zip/sha/pkg; the Linux tarballs) are not raw
          # binaries — stage them separately below.
          #
          # arm64 Linux ships only inside the bundle tarball, so its raw
          # per-CLI artifacts are dropped here — the bootstrap installer is
          # x64-only and would be the only consumer.
          for dir in dist/artifacts/*/; do
            key="$(basename "$dir")"
            case "$key" in
              package-assets|linux-packages-*|*-bun-linux-arm64) continue ;;
            esac
            bin="$(find "$dir" -maxdepth 1 -type f ! -name '*.sha256')"
            test -n "$bin" || { echo "::error::artifact $key has no binary"; exit 1; }
            install -m 0755 "$bin" "dist/release/$key"
            cp "$bin.sha256" "dist/release/$key.sha256"
          done
          cp -R dist/artifacts/package-assets/. dist/release/
          # One artifact per arch (linux-packages-x64, linux-packages-arm64),
          # each holding its tarball + .sha256.
          for dir in dist/artifacts/linux-packages-*/; do
            cp -R "$dir". dist/release/
          done

      # The gear release carries the bootstrap script too, co-versioned with
      # the gear binaries it installs. Any environment — CI, Claude session
      # hooks, a bare shell — bootstraps with one line:
      #   curl -fsSL <gear-release>/fit-install.sh | bash -s -- gemba-trace …
      # Stamp the live tags in as the pinned defaults so the published copy is
      # self-contained; callers may still override via FIT_*_RELEASE.
      # This gate is intentionally gear-only — fit-install.sh installs the gear
      # toolbox, not a product. It is domain asymmetry, not a gear special-case:
      # products are Homebrew-only and carry no bootstrap installer.
      - name: Check out bootstrap script
        if: needs.meta.outputs.bundle == 'gear'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: products/gemba/actions/bootstrap/fit-install.sh
          sparse-checkout-cone-mode: false
          path: src

      - name: Stamp and stage fit-install.sh
        if: needs.meta.outputs.bundle == 'gear'
        run: |
          set -euo pipefail
          sed "s|^FIT_GEAR_RELEASE=.*|FIT_GEAR_RELEASE=\"\${FIT_GEAR_RELEASE:-${GITHUB_REF_NAME}}\"|" \
            src/products/gemba/actions/bootstrap/fit-install.sh > dist/release/fit-install.sh
          chmod +x dist/release/fit-install.sh
          echo "Stamped fit-install.sh: gear=${GITHUB_REF_NAME}"

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes 2>/dev/null \
            || echo "Release $GITHUB_REF_NAME already exists"
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber dist/release/*

  # Update the Homebrew cask. Separate job: it pushes to another repo with a
  # tap-scoped App token (least privilege), and recomputes the hash from the
  # actual zip rather than trusting the sidecar.
  tap:
    needs: [meta, package-macos, package-linux, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download package assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-assets
          path: dist/release

      - name: Download Linux tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "linux-packages-*"
          merge-multiple: true
          path: dist/release

      - name: Compute cask and formula checksums
        id: hash
        env:
          CASK: ${{ needs.meta.outputs.cask }}
          BUNDLE: ${{ needs.meta.outputs.bundle }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          ZIP="dist/release/${CASK}-${VERSION}-darwin-arm64.zip"
          # Recompute every checksum from the actual assets rather than trusting
          # the build sidecar — same trust model as the cask zip.
          {
            echo "sha256=$(shasum -a 256 "$ZIP" | awk '{print $1}')"
            echo "x64_sha=$(shasum -a 256 "dist/release/fit-${BUNDLE}-linux-x64.tar.gz" | awk '{print $1}')"
            echo "arm64_sha=$(shasum -a 256 "dist/release/fit-${BUNDLE}-linux-arm64.tar.gz" | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Checkout tap repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: forwardimpact/homebrew-tap
          token: ${{ steps.ci-app.outputs.token }}
          path: tap

      # The cask's binary block is regenerated from cli-manifest.json, so the
      # manifest and its render script must travel with this job.
      - name: Checkout monorepo for the cask render script
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: main
          persist-credentials: false

      - name: Update cask and formula, push to tap main
        working-directory: tap
        env:
          CASK: ${{ needs.meta.outputs.cask }}
          BUNDLE: ${{ needs.meta.outputs.bundle }}
          VERSION: ${{ needs.meta.outputs.version }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
          X64_SHA: ${{ steps.hash.outputs.x64_sha }}
          ARM64_SHA: ${{ steps.hash.outputs.arm64_sha }}
          KATA_APP_ID: ${{ secrets.KATA_APP_ID }}
        run: |
          set -euo pipefail
          git config user.name "kata-agent-team[bot]"
          git config user.email "${KATA_APP_ID}+kata-agent-team[bot]@users.noreply.github.com"
          CASK_FILE="Casks/${CASK}.rb"
          # version + sha256 are per-release; sed them in place.
          sed -i \
            -e "s|^  version \".*\"|  version \"${VERSION}\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" \
            "$CASK_FILE"
          # Regenerate the cask's binary block from the manifest for every
          # bundle so it can never drift from the shipped set (a stale name
          # fails `brew install` at link time). A single-CLI product yields its
          # one stanza, gear yields ~30 — one code path, no gear special-case.
          bash ../main/build/render-cask-binaries.sh "$CASK_FILE" "$BUNDLE"
          ruby -c "$CASK_FILE"
          # Linux formula: rendered in full from the manifest + cask each
          # release (the tap ships no formula skeleton, unlike the cask), so the
          # first release of any bundle creates Formula/<token>.rb and a new
          # bundle folds in with no hand-seeded tap file.
          FORMULA_FILE="Formula/${CASK}.rb"
          bash ../main/build/render-formula.sh "$FORMULA_FILE" "$CASK" "$BUNDLE" "$VERSION" "$X64_SHA" "$ARM64_SHA" "$CASK_FILE"
          # One commit tracks both packages for this release.
          git add "$CASK_FILE" "$FORMULA_FILE"
          git commit -m "Update ${CASK} to ${VERSION}"
          git push origin HEAD:main
