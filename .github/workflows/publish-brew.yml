name: "Publish: Brew"

on:
  push:
    # Restricted to known brew-bundle tags — `*@v*` would catch every
    # per-library and per-service npm tag (libutil@v*, svcgraph@v*, etc.)
    # which have no .app bundle and would fail the build job.
    tags:
      - "outpost@v*"
      - "guide@v*"
      - "landmark@v*"
      - "map@v*"
      - "pathway@v*"
      - "summit@v*"
      - "gear@v*"

permissions:
  contents: read

jobs:
  binaries:
    permissions:
      contents: read
    uses: ./.github/workflows/build-binaries.yml
    with:
      targets: '["bun-darwin-arm64"]'

  build:
    needs: binaries
    runs-on: macos-14

    # Environment-scoped signing secrets — only jobs that declare this
    # environment can read them, so kata-* agent workflows cannot.
    environment: macos-signing

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Extract bundle and version from tag
        id: meta
        run: |
          NAME="${GITHUB_REF_NAME%%@v*}"
          VERSION="${GITHUB_REF_NAME#*@v}"
          case "$NAME" in
            gear)  KIND=gear;     BUNDLE="fit-gear.app";    CASK=fit-gear    ;;
            *)     KIND=product;  BUNDLE="fit-${NAME}.app"; CASK=fit-${NAME} ;;
          esac
          {
            echo "name=${NAME}"
            echo "version=${VERSION}"
            echo "kind=${KIND}"
            echo "bundle=${BUNDLE}"
            echo "cask=${CASK}"
          } >> "$GITHUB_OUTPUT"

      - uses: forwardimpact/fit-bootstrap@22e7a8a053c22cf56d6f4efb95fcf0b3d42267c8 # v1

      - uses: ./.github/actions/audit

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-bun-darwin-arm64"
          path: dist/binaries
          merge-multiple: true

      - name: Set up code signing
        id: signing
        uses: ./.github/actions/macos-signing
        with:
          app-cert-base64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          app-cert-password: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}

      - name: Assemble bundle
        env:
          KIND: ${{ steps.meta.outputs.kind }}
          NAME: ${{ steps.meta.outputs.name }}
        run: |
          # upload-artifact drops the executable bit; restore it before wrapping.
          find dist/binaries -type f ! -name '*.sha256' -exec chmod +x {} +
          case "$KIND" in
            gear)     just build-app-gear ;;
            product)  just build-app-product "$NAME" ;;
          esac

      - name: Smoke test
        env:
          KIND: ${{ steps.meta.outputs.kind }}
          NAME: ${{ steps.meta.outputs.name }}
          BUNDLE_NAME: ${{ steps.meta.outputs.bundle }}
        run: |
          BUNDLE="dist/apps/${BUNDLE_NAME}"
          codesign --verify --deep --strict "$BUNDLE"
          # Product bundles run their own CLI's --help. Shared bundles exercise
          # one CLI per bundle (others are reachable via cask binary stanzas).
          # The gear primary-exec (fit-svcgraph) is a long-running server with no
          # --help short-circuit, so smoke the first non-server gear CLI instead;
          # teaching the server entries to honour --help is tracked separately.
          case "$KIND" in
            product)  "$BUNDLE/Contents/MacOS/fit-${NAME}" --help ;;
            gear)
              SMOKE_CLI=$(jq -r '[.clis[] | select(.bundle == "gear" and (.server != true)) | .name][0]' build/cli-manifest.json)
              test -n "$SMOKE_CLI" && [ "$SMOKE_CLI" != "null" ] \
                || { echo "::error::no non-server gear CLI in manifest to smoke"; exit 1; }
              "$BUNDLE/Contents/MacOS/$SMOKE_CLI" --help
              ;;
          esac

      - name: Verify cdhash stability
        # Rebuild the bundle from the same tree and
        # confirm the signed cdhash is identical. A drifting cdhash wipes TCC
        # grants on `brew upgrade`, so a non-deterministic build must fail
        # release rather than ship.
        env:
          KIND: ${{ steps.meta.outputs.kind }}
          NAME: ${{ steps.meta.outputs.name }}
          BUNDLE_NAME: ${{ steps.meta.outputs.bundle }}
        run: |
          BUNDLE="dist/apps/${BUNDLE_NAME}"
          BASELINE=$(codesign -dvvv "$BUNDLE" 2>&1 | grep -i CDHash || true)
          rm -rf dist/apps products/outpost/dist   # keep dist/binaries (artifacts)
          case "$KIND" in
            gear)     just build-app-gear ;;
            product)  just build-app-product "$NAME" ;;
          esac
          AFTER=$(codesign -dvvv "$BUNDLE" 2>&1 | grep -i CDHash || true)
          if [ "$BASELINE" != "$AFTER" ]; then
            echo "::error::cdhash drift detected — bundle is not deterministic"
            echo "baseline: $BASELINE"
            echo "after:    $AFTER"
            exit 1
          fi
          echo "cdhash stable: $AFTER"

      - name: Notarize and staple app
        if: steps.signing.outputs.enabled == 'true'
        env:
          BUNDLE_NAME: ${{ steps.meta.outputs.bundle }}
          API_KEY_B64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          BUNDLE="dist/apps/${BUNDLE_NAME}"
          KEY="$RUNNER_TEMP/api_key.p8"
          printf '%s' "$API_KEY_B64" | base64 --decode > "$KEY"
          # Notarization consumes a zip; the ticket is then stapled onto the
          # .app itself (the cask asset is re-zipped from the stapled bundle).
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$KEY" --key-id "$API_KEY_ID" --issuer "$API_ISSUER" --wait
          xcrun stapler staple "$BUNDLE"
          rm -f "$KEY" "$RUNNER_TEMP/notarize.zip"

      - name: Zip bundle and hash
        id: hash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          CASK: ${{ steps.meta.outputs.cask }}
          BUNDLE_NAME: ${{ steps.meta.outputs.bundle }}
        run: |
          BUNDLE="dist/apps/${BUNDLE_NAME}"
          ASSET="${CASK}-${VERSION}-darwin-arm64.zip"
          # ditto preserves codesign metadata through zip; standard zip does not.
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "dist/apps/${ASSET}"
          shasum -a 256 "dist/apps/${ASSET}" | awk '{print $1}' > "dist/apps/${ASSET}.sha256"
          {
            echo "asset=${ASSET}"
            echo "sha256=$(cat "dist/apps/${ASSET}.sha256")"
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --title "$TAG" --generate-notes 2>/dev/null \
            || echo "Release $TAG already exists"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.hash.outputs.asset }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" \
            "dist/apps/${ASSET}" \
            "dist/apps/${ASSET}.sha256" \
            --clobber

  tap-update:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Extract bundle and version from tag
        id: meta
        run: |
          NAME="${GITHUB_REF_NAME%%@v*}"
          VERSION="${GITHUB_REF_NAME#*@v}"
          case "$NAME" in
            gear)  KIND=gear;     CASK=fit-gear    ;;
            *)     KIND=product;  CASK=fit-${NAME} ;;
          esac
          {
            echo "name=${NAME}"
            echo "version=${VERSION}"
            echo "kind=${KIND}"
            echo "cask=${CASK}"
          } >> "$GITHUB_OUTPUT"

      - name: Download sha256 from release
        id: hash
        env:
          GH_TOKEN: ${{ github.token }}
          CASK: ${{ steps.meta.outputs.cask }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="${CASK}-${VERSION}-darwin-arm64.zip"
          gh release download "$TAG" --pattern "${ASSET}.sha256" --dir . \
            --repo "$GITHUB_REPOSITORY"
          echo "sha256=$(cat "${ASSET}.sha256")" >> "$GITHUB_OUTPUT"

      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Checkout tap repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: forwardimpact/homebrew-tap
          token: ${{ steps.ci-app.outputs.token }}
          path: tap

      - name: Configure git identity
        working-directory: tap
        run: |
          git config user.name "kata-agent-team[bot]"
          git config user.email "${{ secrets.KATA_APP_ID }}+kata-agent-team[bot]@users.noreply.github.com"

      - name: Update cask version and sha256
        env:
          CASK: ${{ steps.meta.outputs.cask }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          # Only the version and sha256 lines are updated per release. The rest of the
          # cask body — binary stanzas, livecheck regex — is human-edited in the tap
          # repo and survives releases unchanged. The casks declare no inter-cask
          # dependencies, so each release rewrites exactly one cask file.
          CASK_FILE="tap/Casks/${CASK}.rb"
          sed -i \
            -e "s|^  version \".*\"|  version \"${VERSION}\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" \
            "$CASK_FILE"

      - name: Commit cask update to main
        working-directory: tap
        env:
          CASK: ${{ steps.meta.outputs.cask }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git add "Casks/${CASK}.rb"
          git commit -m "Update ${CASK} to ${VERSION}"
          git push origin HEAD:main
