name: "Eval: Kata"

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Runs per task (lower for a quick diagnostic dispatch)"
        default: "5"
      max-turns:
        description: "Max agent turns per run"
        default: "25"

concurrency:
  group: eval-kata-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # The kata-skills family's work-tracking tasks (coordinate-finding,
      # product-issue-triage) coordinate through the filesystem tracker; the
      # artifact-spine tasks ignore it. The agent SDK inherits this from the
      # job env, and fit-benchmark resolves it (flag > env > github default).
      LIBEVAL_WORK_TRACKER: filesystem
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@a007a6b9a1fa0db8527b7e29c158db3cf2c96c92 # v1
      - uses: forwardimpact/fit-benchmark@c5764e7213832cbe28978517aa8547c4834ad50a # v1
        with:
          family: ./benchmarks/kata-skills
          runs: ${{ inputs.runs || '5' }}
          max-turns: ${{ inputs.max-turns || '25' }}
          judge-profile: judge
          # runs:5 × 4 tasks ≈ 90+ min of sequential agent+judge sessions;
          # the default 60 timed out mid-run (see run 23).
          timeout-minutes: "120"
      # The action uploads results.jsonl but not the per-run traces. When a run
      # records an agentError (e.g. a supervisor that never produces a turn),
      # only the agent/supervisor/judge ndjson reveals why — auth rejection,
      # subprocess spawn failure, network stall. Upload them so any stall is
      # diagnosable without re-running the whole 90+ min benchmark.
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-traces
          path: benchmark-runs/runs/**
          if-no-files-found: warn
