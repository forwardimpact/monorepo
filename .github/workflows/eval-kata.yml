name: "Eval: Kata"

on:
  workflow_dispatch:

concurrency:
  group: eval-kata-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@22e7a8a053c22cf56d6f4efb95fcf0b3d42267c8 # v1
      - uses: forwardimpact/fit-benchmark@c5764e7213832cbe28978517aa8547c4834ad50a # v1
        with:
          family: ./benchmarks/kata-skills
          runs: "5"
          max-turns: "25"
          judge-profile: judge
          # runs:5 × 4 tasks ≈ 90+ min of sequential agent+judge sessions;
          # the default 60 timed out mid-run (see run 23).
          timeout-minutes: "120"
