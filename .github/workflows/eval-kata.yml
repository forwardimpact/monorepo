name: "Eval: Kata"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - ".claude/skills/kata-*/**"
      - ".claude/agents/*.md"
      - "benchmarks/kata-skills/**"
      - ".github/workflows/eval-kata.yml"

concurrency:
  group: eval-kata-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/bootstrap
      - name: Run benchmark
        run: |
          node ./libraries/libeval/bin/fit-benchmark.js run \
            --family ./benchmarks/kata-skills \
            --runs 5 \
            --max-turns 25 \
            --judge-profile judge
      - name: Report
        if: always()
        run: |
          node ./libraries/libeval/bin/fit-benchmark.js report \
            --format text >> "$GITHUB_STEP_SUMMARY"
      - name: Assert cost envelope (≤ $5)
        if: always()
        run: |
          [ -s ./benchmark-runs/results.jsonl ] || { echo "results.jsonl missing or empty" >&2; exit 1; }
          TOTAL=$(jq -s '[.[].costUsd // 0] | add' ./benchmark-runs/results.jsonl)
          echo "Total cost: $TOTAL USD"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 > 5) exit 1 }'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: results-jsonl
          path: ./benchmark-runs/results.jsonl
          if-no-files-found: warn
