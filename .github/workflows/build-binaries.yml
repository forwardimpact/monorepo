name: "Build: Binaries"

on:
  workflow_call:
    inputs:
      targets:
        description: "JSON array of bun targets to build. Defaults to the standard release set (bun-linux-x64, bun-darwin-arm64)."
        type: string
        required: false
        default: '["bun-linux-x64", "bun-darwin-arm64"]'
      bundle:
        description: "Restrict to one app bundle (manifest .bundle, e.g. outpost, gear). Empty builds every CLI."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      targets:
        description: "JSON array of bun targets to build. Defaults to the standard release set (bun-linux-x64, bun-darwin-arm64)."
        type: string
        required: false
        default: '["bun-linux-x64", "bun-darwin-arm64"]'
      bundle:
        description: "Restrict to one app bundle (manifest .bundle, e.g. outpost, gear). Empty builds every CLI."
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      cells: ${{ steps.gen.outputs.cells }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: gen
        env:
          TARGETS: ${{ inputs.targets }}
          BUNDLE: ${{ inputs.bundle }}
        run: |
          # An empty BUNDLE builds every CLI; a bundle name restricts the matrix
          # to that app's CLIs so a single-product tag doesn't compile all ~30.
          CELLS=$(jq -c --argjson req "$TARGETS" --arg bundle "$BUNDLE" '
            [ .clis[] as $c
              | select($bundle == "" or $c.bundle == $bundle)
              | $c.targets[]
              | select(. as $t | $req | index($t))
              | { cli: $c.name, target: .,
                  os: (if . == "bun-linux-x64" then "ubuntu-latest"
                       elif . == "bun-linux-arm64" then "ubuntu-24.04-arm"
                       else "macos-14" end) } ]
          ' build/cli-manifest.json)
          # Fail loudly on a bad `targets`/`bundle` input rather than emit an
          # empty matrix that silently skips every build.
          test "$(jq 'length' <<<"$CELLS")" -gt 0 \
            || { echo "::error::no manifest CLI matches targets ${TARGETS} bundle '${BUNDLE}'"; exit 1; }
          echo "cells={\"include\":${CELLS}}" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.cells) }}
    runs-on: ${{ matrix.os }}
    # Bound the cell: bootstrap + codegen + compile + smoke is a few minutes, so
    # a stuck cell (e.g. a CLI that hangs on --help) fails fast instead of
    # burning the default job budget.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@01112fad2fa58c513a9f0a7bbb68412056e4b2e2 # v1.0.13
      - name: Ensure codegen is current
        run: just codegen
      - name: Compile
        run: just build-binary "${{ matrix.cli }}" "${{ matrix.target }}"
      - name: Smoke gate
        run: |
          BIN="dist/binaries/${{ matrix.cli }}"
          if [ "${{ matrix.cli }}" = "fit-codegen" ]; then
            # fit-codegen's job is generation, not --help. Gate it on a real
            # generation invocation against the proto set the codegen step above
            # already resolved. --service --client --definition exercises all
            # five mustache render paths (service, client, definition, plus the
            # services-exports and definitions-exports runExports) — the kinds a
            # compiled binary previously failed on with "Missing *.mustache". It
            # skips --type (pbjs subprocess, a separate concern). `set -e` (the
            # default shell) fails the gate on the binary's non-zero exit.
            "$BIN" --service --client --definition
          else
            # Capture stdout+stderr: a CLI that prints --help to stderr must
            # still count as non-empty output (the gate is "starts and writes
            # output"). `set -e` fails the gate when the binary exits non-zero —
            # the startup-crash failure mode.
            OUT="$("$BIN" --help 2>&1)"
            test -n "$OUT" || { echo "::error::${{ matrix.cli }} produced no output"; exit 1; }
          fi
      - name: Checksum
        run: shasum -a 256 "dist/binaries/${{ matrix.cli }}" | awk '{print $1}' > "dist/binaries/${{ matrix.cli }}.sha256"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "${{ matrix.cli }}-${{ matrix.target }}"
          path: |
            dist/binaries/${{ matrix.cli }}
            dist/binaries/${{ matrix.cli }}.sha256
          if-no-files-found: error
