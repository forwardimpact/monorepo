name: "Publish: Actions"

# Outbound mirror for the five co-located composite actions. Each leg splits its
# monorepo prefix with the pinned splitsh-lite and non-force-pushes the
# projection to its sibling repo's main (see ./.github/actions/split-and-push).
# Add or retire an action by editing one matrix entry.
#
# Fires on every push to main that touches an action source (paths-filtered),
# plus manual dispatch. The lineage was seeded once (the only sanctioned force);
# every run here is a non-force fast-forward, and a non-fast-forward — a sibling
# main that diverged from the projection — is rejected and fails the run.
on:
  push:
    branches: [main]
    paths:
      - "libraries/libharness/actions/harness/**"
      - "libraries/libharness/actions/benchmark/**"
      - "libraries/libwiki/actions/wiki/**"
      - "products/kata/actions/kata-agent/**"
      - ".github/actions/bootstrap/**"
      - ".github/actions/split-and-push/**"
      - ".github/workflows/publish-actions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: ${{ matrix.action.repo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action:
          - prefix: libraries/libharness/actions/harness
            repo: harness
          - prefix: libraries/libharness/actions/benchmark
            repo: benchmark
          - prefix: libraries/libwiki/actions/wiki
            repo: wiki
          - prefix: products/kata/actions/kata-agent
            repo: kata-agent
          - prefix: .github/actions/bootstrap
            repo: bootstrap
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.action.repo }}

      # Check out the monorepo (full history — the split needs it). The split
      # and the local-action references below resolve against this checkout,
      # never a sibling.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Do not leave the default-token http.extraheader in git config; it
          # would override the App token in the cross-repo push URL and the push
          # would be denied as github-actions[bot].
          persist-credentials: false

      - uses: ./.github/actions/audit
        with:
          vulnerability-scanning: "false"
          secret-scanning: "true"

      - name: Split and push
        uses: ./.github/actions/split-and-push
        with:
          prefix: ${{ matrix.action.prefix }}
          sibling-repo: ${{ matrix.action.repo }}
          token: ${{ steps.ci-app.outputs.token }}
