name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@93526d6c7d24dfcfbde60c3d7d436f6e305e35a0 # v1.0.5
      - run: bun run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@93526d6c7d24dfcfbde60c3d7d436f6e305e35a0 # v1.0.5
      - run: bun run lint

  jsdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@93526d6c7d24dfcfbde60c3d7d436f6e305e35a0 # v1.0.5
      - run: bun run jsdoc
