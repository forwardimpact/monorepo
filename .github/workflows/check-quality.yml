name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@a007a6b9a1fa0db8527b7e29c158db3cf2c96c92 # v1
      - run: bun run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@a007a6b9a1fa0db8527b7e29c158db3cf2c96c92 # v1
      - run: bun run lint

  jsdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@a007a6b9a1fa0db8527b7e29c158db3cf2c96c92 # v1
      - run: bun run jsdoc

  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@a007a6b9a1fa0db8527b7e29c158db3cf2c96c92 # v1
      - run: bun run invariants
