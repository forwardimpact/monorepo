name: "Website: Kata Agent Team"

on:
  push:
    branches: [main]
    paths:
      - "websites/kata/**"
      - "design/kata/**"
      - "libraries/libdoc/**"
      - ".github/workflows/website-kata.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "website-kata"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: forwardimpact/fit-bootstrap@7084c0a624f84ca714757c3a5d4a8f476b4c70ab # v1.0.3
        with:
          clis: fit-doc

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: ./.github/actions/audit

      - name: Build website
        run: fit-doc build --src=websites/kata --out=dist

      - name: Copy CNAME file
        run: cp websites/kata/CNAME dist/

      - name: Upload site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kata-pages
          path: dist

      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          repositories: kata-pages

      - name: Trigger deployment
        env:
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
        run: |
          gh api repos/forwardimpact/kata-pages/dispatches \
            -f event_type=deploy \
            -f "client_payload[run_id]=${{ github.run_id }}"
