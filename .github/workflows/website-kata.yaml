name: "Website: Kata Agent Team"

on:
  push:
    branches: [main]
    paths:
      - "websites/kata/**"
      - "design/kata/**"
      - "libraries/libdoc/**"
      - ".github/workflows/website-kata.yaml"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/website.yml
    with:
      site: kata
    secrets: inherit
