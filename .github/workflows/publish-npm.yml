name: "Publish: Package"

on:
  push:
    tags: ["*@v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: forwardimpact/fit-bootstrap@22e7a8a053c22cf56d6f4efb95fcf0b3d42267c8 # v1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract package name from tag
        id: package
        run: |
          TAG_NAME="${GITHUB_REF_NAME%%@v*}"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          # Find the npm package name and directory from the tag
          # Workspaces use glob patterns — resolve them with Glob.sync
          # The tag name reaches the script via the environment, never by
          # interpolation into the source text — ref names may legally
          # contain quotes and shell metacharacters.
          PKG_JSON=$(TAG_NAME="$TAG_NAME" bun -e "
            const { globSync } = require('node:fs');
            const { workspaces } = require('./package.json');
            const tag = process.env.TAG_NAME;
            const dirs = workspaces.flatMap(ws => globSync(ws, { withFileTypes: false }));
            for (const dir of dirs) {
              try {
                const pkg = require('./' + dir + '/package.json');
                if (pkg.name.endsWith('/' + tag)) {
                  console.log(JSON.stringify({ name: pkg.name, path: dir }));
                  break;
                }
              } catch {}
            }
          ")
          echo "npm_name=$(echo "$PKG_JSON" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "dir_name=$(echo "$PKG_JSON" | jq -r '.path')" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/audit

      - name: Run tests
        run: bun run test

      - name: Smoke test npm package
        env:
          NPM_NAME: ${{ steps.package.outputs.npm_name }}
          DIR_NAME: ${{ steps.package.outputs.dir_name }}
        run: |
          # Skip smoke install when the package's `os` field excludes the runner's
          # platform (npm install would fail with EBADPLATFORM). Negated entries
          # (e.g. "!win32") exclude that platform; positive entries form an
          # allowlist. Empty/missing field → install everywhere.
          SKIP=$(node -e "
            const p = require('./${DIR_NAME}/package.json');
            const os = Array.isArray(p.os) ? p.os : [];
            if (!os.length) process.exit(0);
            const negated = os.filter(o => o.startsWith('!')).map(o => o.slice(1));
            const positive = os.filter(o => !o.startsWith('!'));
            const platform = process.platform;
            if (negated.includes(platform)) { console.log('yes'); process.exit(0); }
            if (positive.length && !positive.includes(platform)) console.log('yes');
          ")
          if [ -n "$SKIP" ]; then
            echo "::notice::Skipping smoke install for $NPM_NAME — package os field excludes $(node -e 'console.log(process.platform)')"
            exit 0
          fi
          PACK_DIR=$(mktemp -d)
          # prepack/postpack lifecycle banners print to stdout ahead of the
          # tarball filename, so keep only the last line of npm pack output.
          TARBALL=$(npm pack --workspace="$NPM_NAME" --pack-destination="$PACK_DIR" | tail -n 1)
          cd "$PACK_DIR"
          npm init -y
          npm install "$TARBALL" --force
          # Execute the main entry point (skip for bin-only or subpath-only packages).
          # require.resolve only proves the path exists — import() executes the
          # module graph, catching tarballs that omit transitive sources
          # (npm pack silently drops symlinked directories from the packlist).
          HAS_MAIN=$(node -e "const p=JSON.parse(require('fs').readFileSync('node_modules/' + process.env.NPM_NAME + '/package.json','utf8')); if(p.main||(p.exports&&(typeof p.exports==='string'||p.exports['.']))) console.log('yes')")
          if [ -n "$HAS_MAIN" ]; then
            node --input-type=module -e "await import(process.env.NPM_NAME)"
          fi
          # Execute the CLI entry point with --help. Dependencies resolve from
          # the registry during the tarball install above, so the bin runs in
          # true isolation; the timeout guards against a bin that blocks on input.
          BIN=$(node -e "const p=JSON.parse(require('fs').readFileSync('node_modules/' + process.env.NPM_NAME + '/package.json','utf8')); const b=Object.values(p.bin||{})[0]; if(b) console.log(b)")
          if [ -n "$BIN" ]; then
            timeout 30 node "node_modules/$NPM_NAME/$BIN" --help
          fi
          rm -rf "$PACK_DIR"

      - name: Copy LICENSE to package
        env:
          DIR_NAME: ${{ steps.package.outputs.dir_name }}
        run: cp LICENSE "$DIR_NAME"/

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_NAME: ${{ steps.package.outputs.npm_name }}
        run: npm publish --workspace="$NPM_NAME" --access=public
