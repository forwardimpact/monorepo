name: "Publish: Package"

on:
  push:
    tags: ["*@v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: forwardimpact/bootstrap@c349e223de51a865ac223cc712972487393829b5 # v1.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve package from tag
        id: package
        uses: ./.github/actions/resolve-package

      - uses: ./.github/actions/audit

      # libwiki's push path secret-scans with gitleaks (fail-closed); the
      # wiki-sync push tests need the binary present on PATH (mirrors
      # check-test.yml). Without it the real-git tests fail-close here.
      - uses: ./.github/actions/install-gitleaks

      - name: Run tests
        run: bun run test

      - name: Smoke-test npm package
        uses: ./.github/actions/npm-smoke
        with:
          npm-name: ${{ steps.package.outputs.npm_name }}
          dir-name: ${{ steps.package.outputs.dir_name }}

      # In-job so a tag cut from a commit that skipped CI still gets the
      # guarantee that launchers/ equals the rule's output before anything
      # is stamped or published. Runs only this rule module — the full
      # invariant suite assumes a contributor checkout (wiki present).
      - name: Check public-CLI set
        run: |
          node --input-type=module <<'EOF'
          const { createBuildKit } = await import("@forwardimpact/libcoaligned");
          const { createDefaultRuntime } = await import("@forwardimpact/libutil/runtime");
          const mod = (await import("./.coaligned/invariants/public-cli-set.rules.mjs")).default;
          const root = process.cwd();
          const kit = createBuildKit({
            root,
            dir: `${root}/.coaligned/invariants`,
            runtime: createDefaultRuntime(),
          });
          const { subjects } = await mod.build(kit);
          const problems = subjects["public-cli-problem"];
          for (const p of problems) console.error(`::error::${p.path}: ${p.message}`);
          process.exit(problems.length ? 1 : 0);
          EOF

      # A launcher matches when its single dependency is the package this tag
      # ships. Space-separated list; dir names match fit-[a-z-]+ so later
      # steps word-split safely. Empty list -> launcher steps no-op.
      - name: Resolve matching launchers
        id: launchers
        env:
          NPM_NAME: ${{ steps.package.outputs.npm_name }}
        run: |
          DIRS=$(node -e "
            const { globSync } = require('node:fs');
            const dirs = globSync('launchers/*/package.json')
              .filter(p => Object.keys(require('./' + p).dependencies ?? {})[0] === process.env.NPM_NAME)
              .map(p => p.replace('/package.json', ''));
            console.log(dirs.join(' '));
          ")
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT
          echo "Matching launchers: ${DIRS:-none}"

      - name: Stamp, pack, and smoke launchers
        if: steps.launchers.outputs.dirs != ''
        uses: ./.github/actions/npm-launcher-smoke
        with:
          npm-name: ${{ steps.package.outputs.npm_name }}
          dir-name: ${{ steps.package.outputs.dir_name }}
          launcher-dirs: ${{ steps.launchers.outputs.dirs }}

      - name: Copy LICENSE to package
        env:
          DIR_NAME: ${{ steps.package.outputs.dir_name }}
          LAUNCHER_DIRS: ${{ steps.launchers.outputs.dirs }}
        run: |
          cp LICENSE "$DIR_NAME"/
          for L in $LAUNCHER_DIRS; do cp LICENSE "$L"/; done

      - name: Publish to npm
        uses: ./.github/actions/npm-publish
        with:
          npm-name: ${{ steps.package.outputs.npm_name }}
          dir-name: ${{ steps.package.outputs.dir_name }}
          launcher-dirs: ${{ steps.launchers.outputs.dirs }}
          # Verified live: npm owner ls @forwardimpact/libxmr -> dickolsson
          # <hi.npm@senzilla.io>. If the ownership guard ever fails loud,
          # re-check with that command.
          npm-publisher: dickolsson
          npm-token: ${{ secrets.NPM_TOKEN }}
