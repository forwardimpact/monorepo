name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/bootstrap
      - name: Install apm
        shell: bash
        run: |
          if command -v apm &>/dev/null; then
            echo "apm already available: $(apm --version)"
          else
            APM_VERSION="0.12.4"
            ARCH=$(uname -m)
            OS=$(uname -s | tr '[:upper:]' '[:lower:]')
            APM_DIR="$HOME/.local/lib/apm"
            mkdir -p "$APM_DIR" "$HOME/.local/bin"
            curl -fsSL "https://github.com/microsoft/apm/releases/download/v${APM_VERSION}/apm-${OS}-${ARCH}.tar.gz" \
              | tar -xz -C "$APM_DIR" --strip-components=1
            ln -sf "$APM_DIR/apm" "$HOME/.local/bin/apm"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            echo "Installed apm $("$APM_DIR/apm" --version)"
          fi
      - run: bunx fit-terrain build
      - run: bun run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/bootstrap
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chrome
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chrome
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: synthetic-cache
        with:
          path: |
            data/pathway
            data/knowledge
            data/activity
            data/personal
          key: synthetic-${{ hashFiles('data/synthetic/**', 'products/map/schema/json/**', 'bun.lock') }}
      - if: steps.synthetic-cache.outputs.cache-hit != 'true'
        run: just synthetic
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: public
          key: pathway-build-${{ hashFiles('data/synthetic/**', 'products/map/schema/json/**', 'products/pathway/src/**', 'products/map/starter/**', 'libraries/**/src/**', 'libraries/**/package.json', 'bun.lock') }}
      - run: bun run test:e2e
