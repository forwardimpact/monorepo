name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Blocking gate: node --test is the reference-correct runner on the critical
  # path. This is the single required PR + main test check (mark it required in
  # branch protection). The bun `test` job below stays informational.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@6499f90c122c47da6db9bd6e26bf83c572a0a036 # v1.0.1
      # libwiki's push path secret-scans with gitleaks (fail-closed); the
      # wiki-sync integration tests in the gate set need the binary on PATH,
      # exactly as the informational bun `test` job below does.
      - uses: ./.github/actions/install-gitleaks
      - run: bunx fit-terrain build
      - name: Guard against bun:test re-divergence
        run: bun scripts/check-bun-test-imports.mjs
      - name: Run gate (node --test)
        run: bun run test:gate

  # Informational only: keeps the fast bun inner-loop visible. It surfaces the
  # bun#5090 describe-in-test cascade, so it must NOT be a required check —
  # making it blocking would move the flaky blocker from the release tag to the
  # PR queue.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@6499f90c122c47da6db9bd6e26bf83c572a0a036 # v1.0.1
      # libwiki's push path secret-scans with gitleaks (fail-closed); the
      # wiki-sync push tests need the binary present on PATH.
      - uses: ./.github/actions/install-gitleaks
      - run: bunx fit-terrain build
      - run: bun run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@6499f90c122c47da6db9bd6e26bf83c572a0a036 # v1.0.1
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chrome
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chrome
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: synthetic-cache
        with:
          path: |
            data/pathway
            data/knowledge
            data/activity
            data/personal
          key: synthetic-${{ hashFiles('data/synthetic/**', 'products/map/schema/json/**', 'bun.lock') }}
      - if: steps.synthetic-cache.outputs.cache-hit != 'true'
        run: just synthetic
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: public
          key: pathway-build-${{ hashFiles('data/synthetic/**', 'products/map/schema/json/**', 'products/pathway/src/**', 'products/map/starter/**', 'libraries/**/src/**', 'libraries/**/package.json', 'bun.lock') }}
      - run: bun run test:e2e
