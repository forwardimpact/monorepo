name: "Kata: Dispatch"

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled, closed]
  # NOTE: `pull_request_review_comment` is intentionally NOT a trigger.
  # A review submission fires N `pull_request_review_comment.created` events plus one
  # `pull_request_review.submitted` event in the same instant — all share the per-PR
  # concurrency group below, and with `cancel-in-progress: false` the cascade of
  # "newly pending cancels previously pending" cancels every run before any reaches
  # `in_progress` when concurrent review-comment events race and zero facilitators run.
  # The `pull_request_review.submitted` payload already carries every inline diff
  # comment in the batch, so the facilitator can read them via the API — adding the
  # comment trigger back would reintroduce the race without adding any reachable
  # information. Standalone inline comments / thread replies are wrapped in an
  # auto-created `state: COMMENTED` review by GitHub, which also fires `submitted`.
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Ad-hoc prompt for the facilitator"
        required: true
        type: string
      callback_url:
        description: "URL to POST the facilitator conclusion to (optional)"
        required: false
        type: string
      correlation_id:
        description: "Correlation ID returned in the callback payload (optional)"
        required: false
        type: string
      discussion_id:
        description: "Stable identifier for the threaded conversation (carried through traces)"
        required: false
        type: string
      resume_context:
        description: "Serialized prior state when resuming a recessed run (JSON string)"
        required: false
        type: string
      inbox_url:
        description: "Long-poll URL for injecting messages into a live run (optional)"
        required: false
        type: string

permissions:
  contents: write

# Coalesce simultaneous events on the same target so the recursion guard sees a stable thread.
# Triage flows fire `opened` plus several `labeled` events within ~1s; without this, each one
# spawns an independent facilitator → independent agent → independent PR.
#
# `cancel-in-progress: false` is load-bearing: facilitator runs routinely last 30+ minutes
# (e.g. staff engineer doing implementation work). A new label or comment arriving mid-run
# must NOT cancel that work, so flipping this to `true` is not an acceptable fix for any
# downstream race condition — adjust the trigger surface instead (see the `on:` block).
concurrency:
  group: kata-dispatch-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  kata:
    # Bot-authored content is allowed so this workflow can serve as an agent-to-agent coordination channel;
    # the task text contains a recursion guard that stops the facilitator when the latest activity is already
    # a participant agent's response.
    #
    # Label scoping: `labeled` fires once per label, and the product-manager bot applies several labels
    # in rapid succession on triage. Only react to labels that carry routing or approval semantics —
    # `agent:*` (routing) and `*:approved` (gate). Classification labels like `bug`, `triaged`, `experiment`
    # don't add new requests for the facilitator to act on, so they should not fire a run.
    #
    # PR close scoping: `closed` fires on both merge and abandon — only react when `merged: true` so
    # abandoned PRs don't fire a run.
    #
    # Trigger surface: this `if:` must stay aligned with the `on:` block above. There is intentionally
    # no `pull_request_review_comment` clause — see the NOTE on that trigger in `on:` for why adding one
    # back reintroduces the cancel-in-progress race.
    if: >-
      github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && (github.event.action == 'opened' || (github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))))) || github.event_name == 'issue_comment' || (github.event_name == 'pull_request_target' && ((github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))) || (github.event.action == 'closed' && github.event.pull_request.merged == true))) || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      # Killswitch first: fail before any token minting or agent work so one
      # repository variable halts every kata-* workflow at once.
      - name: Kata killswitch
        shell: bash
        env:
          KATA_KILLSWITCH: ${{ vars.KATA_KILLSWITCH }}
        run: |
          case "$(printf '%s' "${KATA_KILLSWITCH:-}" | tr '[:upper:]' '[:lower:]')" in
            ""|0|false|no|off) ;;
            *) echo "::error::KATA_KILLSWITCH engaged (value: ${KATA_KILLSWITCH})." >&2; exit 1 ;;
          esac

      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      # Capture mint time and pair it with the issuing job execution's identity
      # into a single stamp env var. Travels on the same step env as GH_TOKEN
      # (below) so no carried/resumed session state can pair a token with
      # another token's stamp. The create-github-app-token action exports no
      # expiry, so `exp` is derived from the ~1h (3600s) installation-token TTL.
      # `mint` is captured here, one step AFTER the token mint, so it trails the
      # token's true mint by the inter-step latency; to keep `exp` a conservative
      # UNDER-estimate of true expiry (the accounting must never report a dead
      # token as alive in the boundary), `exp` = mint + 3600 − 120s margin. Run
      # id + run attempt make "issuing job execution ≠ current ⇒ presumed
      # revoked" a local comparison (a re-run attempt shares GITHUB_RUN_ID but
      # revokes attempt 1's token). Consumed by the auth-anomaly playbook.
      - name: Stamp installation token
        run: |
          set -euo pipefail
          mint=$(date +%s)
          echo "KATA_GH_TOKEN_STAMP=mint=${mint};exp=$((mint + 3600 - 120));run=${GITHUB_RUN_ID};attempt=${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: forwardimpact/bootstrap@2bebda7abaffe16b79a6a5c4e3e82eddc1f7c7d1 # v1.0.7
        with:
          token: ${{ steps.ci-app.outputs.token }}
          app-slug: kata-agent-team
          app-id: ${{ secrets.KATA_APP_ID }}
          # fit-harness (the Assess and Act step), the cost/callback steps, and
          # the fit-wiki push step all run their binaries straight off PATH —
          # no bunx fallback.
          clis: fit-harness fit-trace fit-wiki

      # Select discuss mode when a discussion_id is supplied (the bridge
      # path resuming or starting a threaded conversation); otherwise run a
      # one-shot facilitate. The discuss / facilitate / supervise modes all
      # take the same lead-profile + agent-profiles pair after the libharness
      # consolidation that landed alongside discuss mode.
      #
      # Task composition lives inside libharness (libraries/libharness/src/events/
      # github.js) — the workflow just hands the runner's native event JSON
      # to the action. `GITHUB_EVENT_NAME` is exported automatically by the
      # runner, so the composer can pick the right template without any
      # extra wiring. Untrusted dispatch inputs (discussion_id,
      # resume_context, dispatch prompt) flow as `with:` inputs; the
      # composite action env-wraps them before they reach any shell, so
      # this surface preserves the same template-injection-safe contract.
      - name: Assess and Act
        id: assess
        uses: forwardimpact/harness@d7562330d565019252c45279124fdb1718c68497 # v1.0.2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          # Token freshness stamp — rides the same step env as GH_TOKEN so the
          # accounting can never pair a token with another token's stamp. See
          # the "Stamp installation token" step and .claude/agents/references/auth-anomaly.md.
          KATA_GH_TOKEN_STAMP: ${{ env.KATA_GH_TOKEN_STAMP }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          CALLBACK_URL: ${{ inputs.callback_url }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
          INBOX_URL: ${{ inputs.inbox_url }}
        with:
          mode: ${{ inputs.discussion_id != '' && 'discuss' || 'facilitate' }}
          task-event: ${{ github.event_path }}
          agent-profiles: release-engineer,product-manager,security-engineer,staff-engineer,technical-writer,improvement-coach
          max-turns: "1500"
          timeout-minutes: "300"
          discussion-id: ${{ inputs.discussion_id }}
          resume-context: ${{ inputs.resume_context }}

      # fit-trace cost tolerates a missing trace, so no file guard is needed.
      - name: Report run cost
        if: always()
        shell: bash
        env:
          TRACE_FILE: ${{ steps.assess.outputs.trace-file }}
        run: fit-trace cost "$TRACE_FILE" --markdown >> "$GITHUB_STEP_SUMMARY"

      # Push agent memory back with a freshly minted token — the token from
      # job start expires after an hour and this run can take up to five.
      - name: Push wiki changes
        if: always()
        uses: forwardimpact/wiki@2dbe4b3bd46d93dab199172e9dff29214fa509ce # v1.0.0
        with:
          command: push
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      # Deliver the facilitator's conclusion to an external caller (e.g. the
      # MS Teams bridge or GitHub Discussions bridge) when one is specified
      # via workflow_dispatch. Skipped on issue/PR events where inputs is
      # null. Runs on both success and failure of the assess step so
      # callers always get a verdict — even when no trace was produced, we
      # POST a failure placeholder so the caller is never stranded.
      - name: Deliver callback
        if: github.event_name == 'workflow_dispatch' && always() && inputs.callback_url != ''
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
          DISCUSSION_ID: ${{ inputs.discussion_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRACE_FILE: ${{ steps.assess.outputs.trace-file }}
        run: |
          set -euo pipefail
          if [ -n "$TRACE_FILE" ] && [ -f "$TRACE_FILE" ]; then
            echo "Using trace file: $TRACE_FILE"
            fit-harness callback \
              --trace-file="$TRACE_FILE" \
              --callback-url="$CALLBACK_URL" \
              --correlation-id="$CORRELATION_ID" \
              --run-url="$RUN_URL" \
              --discussion-id="$DISCUSSION_ID"
          else
            echo "::warning::No trace file found — posting failure placeholder so the caller is not stranded"
            curl -fsS -X POST "$CALLBACK_URL" \
              -H 'Content-Type: application/json' \
              -d "$(jq -n \
                --arg cid "$CORRELATION_ID" \
                --arg run "$RUN_URL" \
                --arg did "$DISCUSSION_ID" \
                '{correlation_id: $cid, kind: "terminal", verdict: "failed", summary: "Facilitator session did not produce a trace; see run log.", run_url: $run, discussion_id: $did, replies: []}')"
          fi
