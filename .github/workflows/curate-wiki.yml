name: Curate wiki

# The shared-state wiki audit, on a defined cadence. This is the SOLE home of
# the shared-wiki audit verdict — the per-PR `wiki` check (check-context.yml)
# no longer reads live wiki state. See the gate doc beside the `wiki` job in
# check-context.yml.
on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Serialize overlapping runs (a manual dispatch during the daily tick) so the
# search-then-create issue logic below cannot open a second issue.
concurrency:
  group: curate-wiki
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: forwardimpact/bootstrap@52b7f3fe405a559fd8f2c95b102499e0df9b152b # v1.0.10
        with:
          clis: fit-wiki
      - name: Checkout wiki (read-only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
      # Audit the shared wiki and, when dirty, route findings to the single
      # wiki-curation issue (create or comment). The label/search/create-or-
      # comment logic lives in `fit-wiki curate`, not here.
      - name: Audit and route findings
        env:
          GH_TOKEN: ${{ github.token }}
          FIT_GH_REPO: ${{ github.repository }}
        run: fit-wiki curate
