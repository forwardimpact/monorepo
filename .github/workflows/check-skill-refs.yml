name: "Skill Refs"

on:
  pull_request:
    branches: [main]
    paths:
      - ".claude/skills/**"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@27438d9d934d1ca9c68aa131026591134dd96ceb # v1.0.2
      - name: Skill ref lint
        run: bun run check-skill-refs
        env:
          GH_TOKEN: ${{ github.token }}

  drift-issue:
    needs: lint
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/fit-bootstrap@27438d9d934d1ca9c68aa131026591134dd96ceb # v1.0.2
      - name: Upsert or close the drift tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          LINT_RESULT: ${{ needs.lint.result }}
        run: |
          TITLE="skill-ref-lint: drift detected"
          EXISTING=$(gh issue list \
            --search "in:title $TITLE" --state open \
            --json number --jq '.[0].number // empty')

          if [ "$LINT_RESULT" = "failure" ]; then
            # Re-run the lint here to capture the current findings for the body.
            BODY=$(bun run check-skill-refs 2>&1 || true)
            BODY=$(printf 'The scheduled skill ref lint failed.\n\n```\n%s\n```\n' "$BODY")
            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" --body "$BODY"
            else
              gh issue create --title "$TITLE" --body "$BODY"
            fi
          elif [ "$LINT_RESULT" = "success" ] && [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" \
              --comment "Skill ref lint is clean again; closing."
          fi
