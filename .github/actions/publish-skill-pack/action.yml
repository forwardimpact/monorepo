name: Publish skill pack
description: >
  Sync one skill pack (its agent references always, and for kata its agent
  profiles) from the monorepo into the checked-out sibling repo, regenerate
  apm.yml and README.md, then commit, push,
  and tag at the pack's package version. All pack-specific values arrive via
  inputs so the three packs share one implementation. Prose and repo names reach
  the scripts through the environment, never by interpolation into source text.

  Primitives are laid out under APM's conventional `.apm/` source root
  (`.apm/skills/<name>/`, `.apm/agents/<name>.agent.md`) so that a bare
  `apm install forwardimpact/<repo>` discovers and installs every primitive,
  agents included. A root-level `agents/` directory is not an APM-recognized
  package form, so agents placed there install for nobody.

inputs:
  pack-prefix:
    description: >
      Skill directory prefix under the source dir's skills/ (e.g. fit,
      coaligned, kata). Leave empty and set `all` when the source dir is itself
      the pack boundary and its skills share no common prefix.
    required: false
    default: ""
  source-dir:
    description: >
      Directory holding skills/ and agents/ to stage from. Defaults to the
      repo-root .claude; a product-local pack points this at its own .claude
      (e.g. products/outpost/templates/.claude).
    default: .claude
  all:
    description: >
      When "true", stage every skill in the source dir regardless of prefix.
      Use for a single-pack source dir whose skills share no common prefix.
    default: "false"
  sibling-repo:
    description: >
      Sibling repo short name (e.g. fit-skills). Names the apm package and the
      `forwardimpact/<repo>` install commands.
    required: true
  version-file:
    description: package.json whose `.version` stamps the apm package and release tag.
    required: true
  apm-description:
    description: Description block written into apm.yml.
    required: true
  readme-title:
    description: README H1 title.
    required: true
  readme-intro:
    description: README intro paragraph rendered under the title.
    required: true
  sync-agents:
    description: When "true", also sync .claude/agents into the pack and list them in the README.
    default: "false"
  app-id:
    description: GitHub App id used to form the committer email.
    required: true
  target-dir:
    description: Path of the checked-out sibling repo.
    default: skills-repo

runs:
  using: composite
  steps:
    - name: Read version
      shell: bash
      env:
        VERSION_FILE: ${{ inputs.version-file }}
      run: |
        VERSION=$(jq -r '.version' "$VERSION_FILE")
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    # Stage the sibling repo's `.apm/` tree, apm.yml, and README in one tested
    # code path. `fit-pack` (libpack) owns the APM layout — skills under
    # `.apm/skills/`, agents under `.apm/agents/<name>.agent.md` — shared with
    # the Pathway git packs so the two cannot drift. Workflows orchestrate;
    # the staging logic lives in the library, not in walls of inline bash.
    - name: Stage pack
      shell: bash
      env:
        PACK_PREFIX: ${{ inputs.pack-prefix }}
        SOURCE_DIR: ${{ inputs.source-dir }}
        STAGE_ALL: ${{ inputs.all }}
        TARGET_DIR: ${{ inputs.target-dir }}
        APM_NAME: ${{ inputs.sibling-repo }}
        APM_DESCRIPTION: ${{ inputs.apm-description }}
        README_TITLE: ${{ inputs.readme-title }}
        README_INTRO: ${{ inputs.readme-intro }}
        SYNC_AGENTS: ${{ inputs.sync-agents }}
      run: |
        # A matrix entry that omits source-dir/all renders them empty here, not
        # as the input defaults, so coalesce to the repo-root prefix pack shape.
        source_dir="${SOURCE_DIR:-.claude}"

        select_flag="--prefix $PACK_PREFIX"
        if [ "$STAGE_ALL" = "true" ]; then
          select_flag="--all"
        fi

        agents_flag=""
        if [ "$SYNC_AGENTS" = "true" ]; then
          agents_flag="--with-agents"
        fi

        fit-pack stage \
          --from "$source_dir" \
          $select_flag \
          --into "$TARGET_DIR" \
          --name "$APM_NAME" \
          --pack-version "$VERSION" \
          --description "$APM_DESCRIPTION" \
          --readme-title "$README_TITLE" \
          --readme-intro "$README_INTRO" \
          $agents_flag

    - name: Commit, push, tag
      shell: bash
      working-directory: ${{ inputs.target-dir }}
      env:
        APP_ID: ${{ inputs.app-id }}
      run: |
        git config user.name "kata-agent-team[bot]"
        git config user.email "${APP_ID}+kata-agent-team[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to publish"
        else
          git commit -m "chore: sync skills from monorepo @ v${VERSION}"
          git push
        fi

        if git ls-remote --exit-code --tags origin "v${VERSION}" >/dev/null 2>&1; then
          echo "Tag v${VERSION} already exists upstream"
        else
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
        fi
