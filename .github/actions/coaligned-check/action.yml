name: Coaligned Check
description: |
  Run coaligned checks against the repository to enforce the layered
  instruction architecture defined in COALIGNED.md.

  When `command` is omitted, every check runs (instructions and jtbd). When
  `command` is set to "instructions", "jtbd", or "invariants", only that
  subcommand runs.

  Assumes the workspace has already been bootstrapped by
  forwardimpact/bootstrap, which installs `coaligned` as a pinned gear
  binary on PATH (it is one of the default tools). The binary is required —
  there is no bunx/npx fallback.

inputs:
  command:
    description: 'Subcommand to run: "instructions", "jtbd", or "invariants". Leave empty to run every check.'
    required: false
    default: ""
  fix:
    description: 'For "jtbd": regenerate stale catalog and jobs blocks in place. Only valid when command=jtbd.'
    required: false
    default: "false"
  working-directory:
    description: Directory in which to run the command. Defaults to the repository root.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
        FIX: ${{ inputs.fix }}
      run: |
        case "$COMMAND" in
          ""|instructions|jtbd|invariants) ;;
          *)
            echo "::error::coaligned-check: unknown command \"$COMMAND\". Expected one of: \"\" (run every check), instructions, jtbd, invariants."
            exit 2
            ;;
        esac
        case "$FIX" in
          true|false) ;;
          *)
            echo "::error::coaligned-check: fix must be \"true\" or \"false\", got \"$FIX\"."
            exit 2
            ;;
        esac
        if [ "$FIX" = "true" ] && [ "$COMMAND" != "jtbd" ]; then
          echo "::error::coaligned-check: fix=true is only supported for command=jtbd."
          exit 2
        fi

    - name: Run coaligned
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND: ${{ inputs.command }}
        FIX: ${{ inputs.fix }}
      run: |
        # coaligned is a pinned gear binary on PATH, installed by bootstrap
        # as a default tool. No bunx/npx fallback — fail hard if it is missing.
        if ! command -v coaligned &>/dev/null; then
          echo "::error::coaligned not found on PATH. Bootstrap with forwardimpact/bootstrap (installs coaligned as a default gear binary) before this step. No bunx/npx fallback." >&2
          exit 1
        fi
        args=()
        if [ -n "$COMMAND" ]; then
          args+=("$COMMAND")
        fi
        if [ "$FIX" = "true" ]; then
          args+=("--fix")
        fi
        coaligned "${args[@]}"
