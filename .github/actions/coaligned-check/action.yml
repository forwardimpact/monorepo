name: Coaligned Check
description: |
  Run coaligned checks against the repository to enforce the layered
  instruction architecture defined in COALIGNED.md.

  When `command` is omitted, every check runs (instructions and jtbd). When
  `command` is set to "instructions", "jtbd", or "invariants", only that
  subcommand runs.

  Assumes the workspace has already been bootstrapped by
  forwardimpact/bootstrap, which installs `coaligned` as a pinned gear
  binary on PATH (it is one of the default tools). The binary is required —
  there is no bunx/npx fallback.

inputs:
  command:
    description: 'Subcommand to run: "instructions", "jtbd", or "invariants". Leave empty to run every check.'
    required: false
    default: ""
  fix:
    description: 'For "jtbd": regenerate stale catalog and jobs blocks in place. Only valid when command=jtbd.'
    required: false
    default: "false"
  working-directory:
    description: Directory in which to run the command. Defaults to the repository root.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Run coaligned
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND: ${{ inputs.command }}
        FIX: ${{ inputs.fix }}
      run: |
        # coaligned is a pinned gear binary on PATH (a default bootstrap tool) —
        # assumed present. It validates its own command/flag set.
        args=()
        [ -n "$COMMAND" ] && args+=("$COMMAND")
        [ "$FIX" = "true" ] && args+=("--fix")
        coaligned "${args[@]}"
