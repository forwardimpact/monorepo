name: Security Audit
description: Run npm audit and gitleaks secret scanning

inputs:
  vulnerability-scanning:
    description: Run dependency vulnerability scanning
    required: false
    default: "true"
  secret-scanning:
    description: Run secret scanning on the repository
    required: false
    default: "false"
  working-directory:
    description: Directory containing package.json
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Vulnerability scanning
      if: inputs.vulnerability-scanning == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Replace bun workspace protocol with plain wildcard for npm compatibility.
        # Use perl for sed -i portability across GNU (Linux) and BSD (macOS) sed.
        find . -name package.json -not -path '*/node_modules/*' -exec \
          perl -pi -e 's/"workspace:\*"/"*"/g' {} +
        npm install --package-lock-only --ignore-scripts --force 2>/dev/null
        npm audit --audit-level=high --omit=dev --workspaces
        rm -f package-lock.json
        git checkout -- '*/package.json' package.json 2>/dev/null || true

    - name: Install gitleaks
      if: inputs.secret-scanning == 'true'
      uses: ./.github/actions/install-gitleaks

    - name: Secret scanning
      if: inputs.secret-scanning == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: gitleaks detect --source . --verbose
