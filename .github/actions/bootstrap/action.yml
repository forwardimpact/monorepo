name: Bootstrap
description: Set up Bun, install just, and run just install

inputs:
  token:
    description: GitHub token with write access to the wiki. When provided, the wiki is checked out into ./wiki and pushed back during post-run cleanup.
    required: false
    default: ""
  app-slug:
    description: GitHub App slug for git identity (e.g. kata-agent-team). When provided with app-id, sets git identity to the app bot account instead of the generic github-actions bot.
    required: false
    default: ""
  app-id:
    description: GitHub App ID for git identity email. Used together with app-slug.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: "1.3.11"
        no-cache: false

    - name: Configure git identity
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        APP_ID: ${{ inputs.app-id }}
      run: |
        if [ -n "$APP_SLUG" ] && [ -n "$APP_ID" ]; then
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        else
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        fi

    - name: Checkout wiki
      if: inputs.token != ''
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.repository }}.wiki
        path: wiki
        token: ${{ inputs.token }}

    - name: Install apm
      shell: bash
      run: |
        if command -v apm &>/dev/null; then
          echo "apm already available: $(apm --version)"
        else
          APM_VERSION="0.12.4"
          ARCH=$(uname -m)
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          case "$OS-$ARCH" in
            linux-x86_64)  APM_SHA256="a9be6afb9f33f63598d11a7de1029722fd2601aa2ecaebfe82f4903e12a23a52" ;;
            linux-aarch64) APM_SHA256="0019dfc4b32d63c1392aa264aed2253c1e0c2fb09216f8e2cc269bbfb8bb49b5" ;;
            darwin-x86_64) APM_SHA256="c76ef17fa3250f87131ee09d1c8e166fce535dc2d7cea6e44fc1c5d0e3df0bac" ;;
            darwin-arm64)  APM_SHA256="1354eb636a2b84f03938a3bd8890175298f57650e6d8507f2d084d3c66c10fd0" ;;
            *) echo "::error::apm install: unsupported platform $OS-$ARCH" >&2; exit 1 ;;
          esac
          APM_DIR="$HOME/.local/lib/apm"
          mkdir -p "$APM_DIR" "$HOME/.local/bin"
          curl -fsSL -o "$APM_DIR/apm.tar.gz" "https://github.com/microsoft/apm/releases/download/v${APM_VERSION}/apm-${OS}-${ARCH}.tar.gz"
          echo "${APM_SHA256}  ${APM_DIR}/apm.tar.gz" | sha256sum -c -
          tar -xz -C "$APM_DIR" --strip-components=1 -f "$APM_DIR/apm.tar.gz"
          rm "$APM_DIR/apm.tar.gz"
          ln -sf "$APM_DIR/apm" "$HOME/.local/bin/apm"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "Installed apm $("$APM_DIR/apm" --version)"
        fi

    - name: Bootstrap
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: ./scripts/bootstrap.sh

    - name: Push wiki changes
      if: inputs.token != ''
      uses: ./.github/actions/post-run
      with:
        command: just wiki-push
