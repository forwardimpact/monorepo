name: FIT Bootstrap
description: >
  Opinionated FIT environment bootstrap. Sets up Bun, restores a single
  environment cache (CLI tools in ~/.local + node_modules + generated),
  installs anything missing, optionally checks out the GitHub wiki, and runs
  ./scripts/bootstrap.sh. To push the wiki back, run forwardimpact/wiki@v1
  after the agent step.

inputs:
  token:
    description: >
      GitHub token with read access to the wiki. When provided, the wiki is
      checked out into ./wiki. Leave blank to skip wiki checkout entirely.
      Pushing the wiki back is the caller's responsibility — see
      forwardimpact/wiki@v1.
    required: false
    default: ""
  app-slug:
    description: >
      GitHub App slug for git identity (e.g. kata-agent-team). When
      provided with app-id, sets git identity to the app bot account
      instead of the generic github-actions bot.
    required: false
    default: ""
  app-id:
    description: >
      GitHub App ID for git identity email. Used together with app-slug.
    required: false
    default: ""
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.11"
  clis:
    description: >
      Space-separated fit-* CLIs to install as pinned, pre-compiled binaries
      onto PATH (e.g. "fit-wiki fit-harness fit-trace"). Empty installs only
      the external tool set. The binaries are fetched and SHA-verified by the
      bundled fit-install.sh; an unsupported platform fails hard.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}
        no-cache: false

    - name: Configure git identity
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        APP_ID: ${{ inputs.app-id }}
      run: |
        if [ -n "$APP_SLUG" ] && [ -n "$APP_ID" ]; then
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        else
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        fi

    # Rebase onto origin/main BEFORE the workspace cache key is computed, for
    # two reasons. (1) Currency: the run executes against current main, not a
    # stale branch point. (2) Cache correctness: the key hashes bun.lock and
    # the proto tree, so it must reflect the post-rebase tree we actually run
    # against — otherwise a release commit that added a new @forwardimpact/*
    # package could land a "hit" on node_modules that predates it, skipping
    # bun install and leaving codegen unable to resolve common.proto. This is
    # the sole place the rebase happens; scripts/bootstrap.sh does not sync.
    - name: Sync workspace to origin/main
      shell: bash
      run: |
        set -euo pipefail
        if [ -f .git/shallow ]; then
          git fetch --unshallow origin
        fi
        git fetch origin main
        current_branch=$(git branch --show-current)
        if [ "$current_branch" = "main" ]; then
          git merge --ff-only origin/main
        else
          git branch -f main origin/main
          if git rebase main 2>/dev/null; then
            echo "Rebased '$current_branch' onto main."
          else
            git rebase --abort
            echo "Branch '$current_branch' has conflicts with main; cache key reflects pre-rebase state."
          fi
        fi

    - name: Checkout wiki
      if: inputs.token != ''
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.repository }}.wiki
        path: wiki
        token: ${{ inputs.token }}

    # One environment cache covers both the CLI tools and the workspace
    # (node_modules + generated). This step emits every path as one
    # newline-separated list: the paths the bundled fit-install.sh declares via
    # --paths (each tool's lib dir + bin symlink, plus any requested fit-*
    # binary — keeping unrelated ~/.local tooling like uv/Python out of the
    # cache), plus the workspace dirs. Folding the two former caches into a
    # single restore drops an actions/cache round-trip from the critical path.
    # Layout is static, so the tool paths are correct even on a cold cache
    # before anything is installed. The installer is bundled in the action
    # ($GITHUB_ACTION_PATH), so this never depends on a consumer-repo script.
    - name: Resolve cache paths
      id: cache-paths
      shell: bash
      env:
        CLIS: ${{ inputs.clis }}
      run: |
        {
          echo "paths<<EOF"
          bash "$GITHUB_ACTION_PATH/fit-install.sh" --paths $CLIS
          printf '%s\n' node_modules generated 'libraries/*/src/generated'
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        # Different clis sets cache distinctly: a job's cache must never restore
        # another job's tool set. Sanitize the clis string into the key below.
        echo "clis_key=$(printf '%s' "$CLIS" | tr ' ' '_' | tr -cd 'a-zA-Z0-9_-')" >> "$GITHUB_OUTPUT"
        # Hash the bundled installer into the key. It carries every tool version
        # AND the pinned gear release, so a new gear release (new gear binaries)
        # invalidates the cache automatically — without this a stale cache hit
        # serves the previous release's binaries and skips the reinstall.
        echo "installer_hash=$(sha256sum "$GITHUB_ACTION_PATH/fit-install.sh" | cut -c1-12)" >> "$GITHUB_OUTPUT"

    - name: Restore environment cache
      id: env-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.cache-paths.outputs.paths }}
        # The vN prefix is a manual cache-buster: bump it (v2 → v3 → …) when the
        # cached layout changes in a way hashFiles can't see — e.g. the v3 move
        # to the action-bundled fit-install.sh. v4 adds the clis_key segment so
        # each tool set caches separately. The installer_hash segment now folds
        # in the bundled installer's own contents (tool versions + gear release),
        # so tool/binary version changes invalidate the cache automatically and
        # the vN prefix no longer needs a manual bump for them. hashFiles still
        # invalidates on lockfile / proto / codegen-source edits.
        key: env-v4-${{ runner.os }}-${{ steps.cache-paths.outputs.clis_key }}-${{ steps.cache-paths.outputs.installer_hash }}-${{ hashFiles('bun.lock', '**/*.proto', 'libraries/libcodegen/src/**', 'libraries/libcodegen/templates/**', 'libraries/libcodegen/bin/**') }}

    - name: Install CLI dependencies
      if: steps.env-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        CLIS: ${{ inputs.clis }}
      run: bash "$GITHUB_ACTION_PATH/fit-install.sh" $CLIS

    - name: Add deps to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Bootstrap
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BOOTSTRAP_WORKSPACE_CACHE_HIT: ${{ steps.env-cache.outputs.cache-hit }}
      run: ./scripts/bootstrap.sh
