name: macOS signing setup
description: >
  Import Developer ID signing certificates into a temporary keychain so
  codesign/productbuild can sign with a real identity. No-ops (enabled=false)
  when no certificate is supplied, so builds fall back to ad-hoc signing.
  Accepts the Application cert, the Installer cert, or both. On success,
  exports MACOS_SIGN_IDENTITY and/or MACOS_INSTALLER_IDENTITY to the job
  environment for sign-app.sh and build-pkg.sh to consume.

inputs:
  app-cert-base64:
    description: Base64-encoded Developer ID Application .p12 (signs .app + binaries)
    required: false
    default: ""
  app-cert-password:
    description: Password for the Application .p12
    required: false
    default: ""
  installer-cert-base64:
    description: Base64-encoded Developer ID Installer .p12 (signs .pkg)
    required: false
    default: ""
  installer-cert-password:
    description: Password for the Installer .p12
    required: false
    default: ""

outputs:
  enabled:
    description: "true when a signing certificate was imported"
    value: ${{ steps.setup.outputs.enabled }}
  app-identity:
    description: Developer ID Application identity name
    value: ${{ steps.setup.outputs.app-identity }}
  installer-identity:
    description: Developer ID Installer identity name
    value: ${{ steps.setup.outputs.installer-identity }}

runs:
  using: composite
  steps:
    - id: setup
      shell: bash
      env:
        APP_CERT_B64: ${{ inputs.app-cert-base64 }}
        APP_CERT_PW: ${{ inputs.app-cert-password }}
        INSTALLER_CERT_B64: ${{ inputs.installer-cert-base64 }}
        INSTALLER_CERT_PW: ${{ inputs.installer-cert-password }}
      run: |
        set -euo pipefail

        if [ -z "$APP_CERT_B64" ] && [ -z "$INSTALLER_CERT_B64" ]; then
          echo "No Developer ID certificate supplied — falling back to ad-hoc signing."
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
        KEYCHAIN_PW="$(openssl rand -hex 24)"

        security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
        security set-keychain-settings -lut 21600 "$KEYCHAIN"
        security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

        import_cert() {
          local file
          file="$(mktemp "$RUNNER_TEMP/cert.XXXXXX.p12")"
          printf '%s' "$1" | base64 --decode > "$file"
          security import "$file" -k "$KEYCHAIN" -P "$2" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          rm -f "$file"
        }

        if [ -n "$APP_CERT_B64" ]; then
          import_cert "$APP_CERT_B64" "$APP_CERT_PW"
        fi
        if [ -n "$INSTALLER_CERT_B64" ]; then
          import_cert "$INSTALLER_CERT_B64" "$INSTALLER_CERT_PW"
        fi

        # Let codesign/productbuild use the private keys without an interactive
        # prompt, and put this keychain in the user search list.
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
        security list-keychains -d user -s "$KEYCHAIN" \
          $(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g')

        if [ -n "$APP_CERT_B64" ]; then
          APP_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)"
          if [ -z "$APP_IDENTITY" ]; then
            echo "::error::Developer ID Application identity not found after import"
            exit 1
          fi
          echo "MACOS_SIGN_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "app-identity=$APP_IDENTITY" >> "$GITHUB_OUTPUT"
        fi

        if [ -n "$INSTALLER_CERT_B64" ]; then
          INSTALLER_IDENTITY="$(security find-identity -v "$KEYCHAIN" \
            | sed -n 's/.*"\(Developer ID Installer:[^"]*\)".*/\1/p' | head -1)"
          if [ -z "$INSTALLER_IDENTITY" ]; then
            echo "::error::Developer ID Installer identity not found after import"
            exit 1
          fi
          echo "MACOS_INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
          echo "installer-identity=$INSTALLER_IDENTITY" >> "$GITHUB_OUTPUT"
        fi

        echo "enabled=true" >> "$GITHUB_OUTPUT"
        echo "Imported Developer ID identities into a temporary keychain."
