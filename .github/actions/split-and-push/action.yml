name: Split and push
description: >-
  Split one monorepo prefix into its deterministic projection with the pinned
  splitsh-lite and push it non-force to the sibling repo's main. Determinism
  makes the published lineage append-only, so a normal publish is a
  fast-forward; a non-fast-forward means the sibling main carries a commit
  absent from the projection (drift) and the push is rejected, failing the step.

inputs:
  prefix:
    description: >-
      Monorepo path to split — the co-located action home, e.g.
      libraries/libwiki/actions/wiki.
    required: true
  sibling-repo:
    description: >-
      Sibling repo name under forwardimpact/ to publish to, e.g. wiki.
    required: true
  token:
    description: >-
      App token scoped to the sibling repo, with push rights to its main.
    required: true

runs:
  using: composite
  steps:
    - name: Install splitsh-lite (pinned, SHA-verified)
      shell: bash
      run: |
        # v1.0.x ships a prebuilt lite_linux_amd64 asset (v2 is source-only).
        # The same version+digest must back the one-time seed (the seed and
        # every CI push must emit identical SHAs, or the first push is a
        # non-fast-forward). A bump is a deliberate re-seed via security review.
        SPLITSH_VERSION="1.0.1"
        SPLITSH_SHA256="2539301ce5e21d0ca44b689d0dd2c1b20d9f9e996c1fe6c462afb8af4e7141cc"
        curl -sSfL -o splitsh.tar.gz \
          "https://github.com/splitsh/lite/releases/download/v${SPLITSH_VERSION}/lite_linux_amd64.tar.gz"
        echo "${SPLITSH_SHA256}  splitsh.tar.gz" | sha256sum -c -
        tar xzf splitsh.tar.gz
        rm splitsh.tar.gz
        chmod +x splitsh-lite
        sudo mv splitsh-lite /usr/local/bin/

    - name: Split and push (non-force)
      shell: bash
      env:
        PREFIX: ${{ inputs.prefix }}
        REPO: ${{ inputs.sibling-repo }}
        TOKEN: ${{ inputs.token }}
      run: |
        # splitsh-lite prints the split tip SHA to stdout (progress to stderr).
        # The seed runbook captures the SHA identically, so the seed tip and the
        # first CI push agree.
        SHA="$(splitsh-lite --prefix="$PREFIX")"
        if [ -z "$SHA" ]; then
          echo "splitsh-lite produced no SHA for prefix ${PREFIX}" >&2
          exit 1
        fi
        echo "split ${PREFIX} -> ${SHA}"
        # Plain refspec, no leading `+` and no force flag: the remote main IS
        # the record of the last projection, so a non-fast-forward is rejected
        # here and fails the run.
        git push "https://x-access-token:${TOKEN}@github.com/forwardimpact/${REPO}.git" \
          "${SHA}:refs/heads/main"
