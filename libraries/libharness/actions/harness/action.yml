name: FIT Harness
description: Run agent tasks via the fit-harness CLI using the Claude Agent SDK

inputs:
  task-file:
    description: Path to task file (mutually exclusive with task-text / task-event)
    required: false
  task-text:
    description: Inline task text (mutually exclusive with task-file / task-event)
    required: false
  task-event:
    description: |
      Path to a native GitHub event payload JSON (typically github.event_path).
      The CLI composes the task from the payload using the (event_name, action)
      template that matches `$GITHUB_EVENT_NAME`, and lifts `payload.inputs.prompt`
      into the task amendment. Mutually exclusive with task-file / task-text.
    required: false
  mode:
    description: Execution mode — "run", "supervise", "facilitate", or "discuss"
    required: false
    default: "run"
  cwd:
    description: Agent working directory (for "run" mode)
    required: false
    default: "."
  supervisor-cwd:
    description: Supervisor working directory (for "supervise" mode)
    required: false
    default: "."
  agent-cwd:
    description: Agent working directory (for supervise, facilitate, and discuss modes)
    required: false
    default: "."
  agent-model:
    description: Claude model for agents (all modes); empty uses the fit-harness CLI default
    required: false
    default: ""
  lead-model:
    description: Claude model for the lead role (supervisor / facilitator / chair) — used by supervise, facilitate, and discuss modes; empty uses the fit-harness CLI default
    required: false
    default: ""
  max-turns:
    description: Maximum turns (0 = unlimited)
    required: false
    default: "200"
  allowed-tools:
    description: Comma-separated list of allowed tools for the agent
    required: false
    default: "Bash,Read,Glob,Grep,Write,Edit,Agent,TodoWrite"
  supervisor-allowed-tools:
    description: Comma-separated list of allowed tools for the supervisor (supervise mode only)
    required: false
  lead-profile:
    description: Lead role profile name (supervisor / facilitator / chair) — used by supervise, facilitate, and discuss modes
    required: false
  agent-profile:
    description: Agent profile name (run and supervise modes)
    required: false
  agent-profiles:
    description: Comma-separated agent profile names (facilitate and discuss modes)
    required: false
  task-amend:
    description: Additional text appended to the task prompt for steering
    required: false
  mcp-server:
    description: "MCP service name to connect to (e.g. guide); adds mcp__<name>__* to allowed tools"
    required: false
  discussion-id:
    description: Stable id for the threaded discussion (discuss mode); carried through traces for linking and used by callers to resume a suspended run
    required: false
  resume-context:
    description: JSON-serialized prior state for a resumed discuss run (discuss mode)
    required: false
  trace:
    description: Enable trace capture and artifact upload
    required: false
    default: "true"
  timeout-minutes:
    description: Maximum minutes the agent step may run before being cancelled
    required: false
    default: "45"
  case:
    description: Case identifier embedded in trace artifact filenames (use the matrix case id for matrix runs; defaults to "default")
    required: false
    default: "default"
  artifact-suffix:
    description: (Deprecated — pass `case` instead) Legacy alias for `case`; honored with a warning when set
    required: false
    default: ""

outputs:
  trace-dir:
    description: |
      Absolute path of the mktemp directory holding all trace files for this
      run (empty when `trace` is disabled). Use this to read or post-process
      the raw or split trace files from subsequent workflow steps without
      globbing `/tmp`.
    value: ${{ steps.setup.outputs.trace-dir }}
  trace-file:
    description: |
      Absolute path of the raw NDJSON trace file
      (`<trace-dir>/trace--<case>.raw.ndjson`). Empty when `trace` is
      disabled. Wraps each agent/supervisor/facilitator/chair/orchestrator
      event in `{source, seq, event}` envelopes; downstream tooling that
      needs the structured envelope (e.g. extracting the orchestrator
      summary) should read this path directly.
    value: ${{ steps.setup.outputs.trace-file }}
  case:
    description: Effective case identifier (after resolving `case` / legacy `artifact-suffix`).
    value: ${{ steps.setup.outputs.case }}

runs:
  using: composite
  steps:
    - name: Setup trace directory
      if: inputs.trace == 'true'
      id: setup
      shell: bash
      env:
        CASE_INPUT: ${{ inputs.case }}
        SUFFIX_INPUT: ${{ inputs.artifact-suffix }}
      run: |
        TRACE_DIR=$(mktemp -d)
        echo "trace-dir=$TRACE_DIR" >> "$GITHUB_OUTPUT"
        # Resolve effective case. Explicit `case` (non-default) wins; legacy
        # `artifact-suffix` is honored with a deprecation warning; otherwise
        # fall through to "default".
        if [ -n "$CASE_INPUT" ] && [ "$CASE_INPUT" != "default" ]; then
          EFFECTIVE_CASE="$CASE_INPUT"
        elif [ -n "$SUFFIX_INPUT" ]; then
          echo "::warning::artifact-suffix is deprecated; pass case=<id> instead"
          EFFECTIVE_CASE="$SUFFIX_INPUT"
        else
          EFFECTIVE_CASE="default"
        fi
        echo "case=$EFFECTIVE_CASE" >> "$GITHUB_OUTPUT"
        # Publish the raw trace file path so downstream steps can read it
        # without globbing /tmp. Kept in sync with the --output path passed
        # to the CLI in the "Run fit-harness" step below.
        echo "trace-file=$TRACE_DIR/trace--$EFFECTIVE_CASE.raw.ndjson" >> "$GITHUB_OUTPUT"

    - name: Run fit-harness
      shell: bash
      env:
        # The agent runs in bypass-permissions mode
        # (--dangerously-skip-permissions), which Claude Code refuses under
        # uid 0 unless the process is marked sandboxed. CI containers may run
        # as root, so mark the run sandboxed; the SDK forwards this env to the
        # spawned Claude Code process. Harmless on non-root runners. Without it
        # the agent exits 1 with no output before its first turn.
        IS_SANDBOX: "1"
        MODE: ${{ inputs.mode }}
        TASK_FILE: ${{ inputs.task-file }}
        TASK_TEXT: ${{ inputs.task-text }}
        TASK_EVENT: ${{ inputs.task-event }}
        CWD: ${{ inputs.cwd }}
        SUPERVISOR_CWD: ${{ inputs.supervisor-cwd }}
        AGENT_CWD: ${{ inputs.agent-cwd }}
        AGENT_MODEL: ${{ inputs.agent-model }}
        LEAD_MODEL: ${{ inputs.lead-model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        TOOLS: ${{ inputs.allowed-tools }}
        SUPERVISOR_TOOLS: ${{ inputs.supervisor-allowed-tools }}
        LEAD_PROFILE: ${{ inputs.lead-profile }}
        AGENT_PROFILE: ${{ inputs.agent-profile }}
        AGENT_PROFILES: ${{ inputs.agent-profiles }}
        TASK_AMEND: ${{ inputs.task-amend }}
        MCP_SERVER: ${{ inputs.mcp-server }}
        DISCUSSION_ID: ${{ inputs.discussion-id }}
        RESUME_CONTEXT: ${{ inputs.resume-context }}
        TRACE_ENABLED: ${{ inputs.trace }}
        TRACE_DIR: ${{ steps.setup.outputs.trace-dir }}
        TRACE_CASE: ${{ steps.setup.outputs.case }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        # fit-harness must already be on PATH as a pinned gear binary, installed
        # by forwardimpact/fit-bootstrap with `clis: fit-harness fit-trace`.
        # There is no bunx/npx fallback: the binary distribution is the only
        # supported path, so a missing binary fails hard rather than silently
        # resolving a different (registry) build.
        if ! command -v fit-harness &>/dev/null; then
          echo "::error::fit-harness not found on PATH. Install it as a gear binary via forwardimpact/fit-bootstrap with 'clis: fit-harness fit-trace' before this step. No bunx/npx fallback." >&2
          exit 1
        fi
        HARNESS_CMD="fit-harness"

        args=()

        # Resolve task source — exactly one of task-file, task-text, task-event
        # is required. task-event hands the runner's native event JSON to the
        # CLI; libharness composes the task from the (event_name, action) template
        # and lifts payload.inputs.prompt into the amendment.
        task_sources=0
        [ -n "$TASK_FILE" ] && task_sources=$((task_sources + 1))
        [ -n "$TASK_TEXT" ] && task_sources=$((task_sources + 1))
        [ -n "$TASK_EVENT" ] && task_sources=$((task_sources + 1))

        if [ "$task_sources" -eq 0 ]; then
          echo "::error::One of task-file, task-text, task-event is required"
          exit 1
        elif [ "$task_sources" -gt 1 ]; then
          echo "::error::task-file, task-text, task-event are mutually exclusive"
          exit 1
        fi

        if [ -n "$TASK_FILE" ]; then
          args+=("--task-file=$TASK_FILE")
        elif [ -n "$TASK_TEXT" ]; then
          args+=("--task-text=$TASK_TEXT")
        else
          args+=("--task-event=$TASK_EVENT")
        fi

        if [ -n "$TASK_AMEND" ]; then
          args+=("--task-amend=$TASK_AMEND")
        fi

        if [ -n "$MCP_SERVER" ]; then
          args+=("--mcp-server=$MCP_SERVER")
        fi

        if [ "$TRACE_ENABLED" = "true" ] && [ -n "$TRACE_DIR" ]; then
          args+=("--output=$TRACE_DIR/trace--${TRACE_CASE}.raw.ndjson")
        fi

        # Mode-invariant flags. --max-turns is always forwarded; the CLI
        # treats "0" as unlimited, while omitting the flag silently falls
        # back to the SDK's ~50-turn cap.
        args+=("--max-turns=$MAX_TURNS")
        # Model flags are omitted when empty so the CLI defaults
        # (@forwardimpact/libutil/models) stay the single source of truth.
        if [ -n "$AGENT_MODEL" ]; then
          args+=("--agent-model=$AGENT_MODEL")
        fi

        if [ "$MODE" = "supervise" ]; then
          if [ -n "$LEAD_MODEL" ]; then
            args+=("--lead-model=$LEAD_MODEL")
          fi
          if [ -n "$LEAD_PROFILE" ]; then
            args+=("--lead-profile=$LEAD_PROFILE")
          fi
          if [ -n "$SUPERVISOR_TOOLS" ]; then
            args+=("--supervisor-allowed-tools=$SUPERVISOR_TOOLS")
          fi
          if [ -n "$AGENT_PROFILE" ]; then
            args+=("--agent-profile=$AGENT_PROFILE")
          fi

          # Composite action steps can't use the GitHub `timeout-minutes`
          # field, so enforce the cap with the shell `timeout` command.
          timeout "${TIMEOUT_MINUTES}m" $HARNESS_CMD supervise \
            --supervisor-cwd="$SUPERVISOR_CWD" \
            --agent-cwd="$AGENT_CWD" \
            --allowed-tools="$TOOLS" \
            "${args[@]}"
        elif [ "$MODE" = "facilitate" ]; then
          if [ -n "$LEAD_MODEL" ]; then
            args+=("--lead-model=$LEAD_MODEL")
          fi
          if [ -n "$LEAD_PROFILE" ]; then
            args+=("--lead-profile=$LEAD_PROFILE")
          fi

          timeout "${TIMEOUT_MINUTES}m" $HARNESS_CMD facilitate \
            --facilitator-cwd="." \
            --agent-profiles="$AGENT_PROFILES" \
            --agent-cwd="$AGENT_CWD" \
            "${args[@]}"
        elif [ "$MODE" = "discuss" ]; then
          if [ -n "$LEAD_MODEL" ]; then
            args+=("--lead-model=$LEAD_MODEL")
          fi
          if [ -n "$LEAD_PROFILE" ]; then
            args+=("--lead-profile=$LEAD_PROFILE")
          fi
          if [ -n "$AGENT_PROFILES" ]; then
            args+=("--agent-profiles=$AGENT_PROFILES")
          fi
          if [ -n "$DISCUSSION_ID" ]; then
            args+=("--discussion-id=$DISCUSSION_ID")
          fi
          if [ -n "$RESUME_CONTEXT" ]; then
            args+=("--resume-context=$RESUME_CONTEXT")
          fi

          timeout "${TIMEOUT_MINUTES}m" $HARNESS_CMD discuss \
            --agent-cwd="$AGENT_CWD" \
            "${args[@]}"
        else
          if [ -n "$AGENT_PROFILE" ]; then
            args+=("--agent-profile=$AGENT_PROFILE")
          fi

          timeout "${TIMEOUT_MINUTES}m" $HARNESS_CMD run \
            --cwd="$CWD" \
            --allowed-tools="$TOOLS" \
            "${args[@]}"
        fi

    - name: Split trace
      if: always() && inputs.trace == 'true' && steps.setup.outputs.trace-dir != ''
      shell: bash
      env:
        TRACE_DIR: ${{ steps.setup.outputs.trace-dir }}
        MODE: ${{ inputs.mode }}
        TRACE_CASE: ${{ steps.setup.outputs.case }}
      run: |
        # fit-trace is a pinned gear binary on PATH (fit-bootstrap clis:
        # fit-trace). No bunx/npx fallback — fail hard if it is missing.
        if ! command -v fit-trace &>/dev/null; then
          echo "::error::fit-trace not found on PATH. Install it as a gear binary via forwardimpact/fit-bootstrap with 'clis: fit-trace' before this step. No bunx/npx fallback." >&2
          exit 1
        fi
        TRACE_CMD="fit-trace"
        # `fit-trace split` only accepts run|supervise|facilitate today, but
        # the splitter itself is mode-agnostic (it buckets by envelope
        # `source`). Discuss runs have the same lead + N-participants shape
        # as facilitate, so map them onto `facilitate` for the splitter.
        SPLIT_MODE="$MODE"
        if [ "$SPLIT_MODE" = "discuss" ]; then
          SPLIT_MODE="facilitate"
        fi
        $TRACE_CMD split "$TRACE_DIR/trace--${TRACE_CASE}.raw.ndjson" \
          --mode="$SPLIT_MODE" \
          --case="$TRACE_CASE" \
          --output-dir="$TRACE_DIR"

    - name: Upload trace bundle
      if: always() && inputs.trace == 'true' && steps.setup.outputs.trace-dir != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: trace--${{ steps.setup.outputs.case }}
        path: ${{ steps.setup.outputs.trace-dir }}/trace--*.ndjson
