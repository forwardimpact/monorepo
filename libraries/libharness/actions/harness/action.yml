name: FIT Harness
description: Run agent tasks via the fit-harness CLI using the Claude Agent SDK

inputs:
  task-file:
    description: Path to task file (mutually exclusive with task-text / task-event)
    required: false
  task-text:
    description: Inline task text (mutually exclusive with task-file / task-event)
    required: false
  task-event:
    description: |
      Path to a native GitHub event payload JSON (typically github.event_path).
      The CLI composes the task from the payload using the (event_name, action)
      template that matches `$GITHUB_EVENT_NAME`, and lifts `payload.inputs.prompt`
      into the task amendment. Mutually exclusive with task-file / task-text.
    required: false
  mode:
    description: Execution mode — "run", "supervise", "facilitate", or "discuss"
    required: false
    default: "run"
  cwd:
    description: Agent working directory (for "run" mode)
    required: false
    default: "."
  supervisor-cwd:
    description: Supervisor working directory (for "supervise" mode)
    required: false
    default: "."
  agent-cwd:
    description: Agent working directory (for supervise, facilitate, and discuss modes)
    required: false
    default: "."
  agent-model:
    description: Claude model for agents (all modes); empty uses the fit-harness CLI default
    required: false
    default: ""
  lead-model:
    description: Claude model for the lead role (supervisor / facilitator / chair) — used by supervise, facilitate, and discuss modes; empty uses the fit-harness CLI default
    required: false
    default: ""
  max-turns:
    description: Maximum turns (0 = unlimited)
    required: false
    default: "200"
  allowed-tools:
    description: Comma-separated list of allowed tools for the agent
    required: false
    default: "Bash,Read,Glob,Grep,Write,Edit,Agent,TodoWrite"
  supervisor-allowed-tools:
    description: Comma-separated list of allowed tools for the supervisor (supervise mode only)
    required: false
  lead-profile:
    description: Lead role profile name (supervisor / facilitator / chair) — used by supervise, facilitate, and discuss modes
    required: false
  agent-profile:
    description: Agent profile name (run and supervise modes)
    required: false
  agent-profiles:
    description: Comma-separated agent profile names (facilitate and discuss modes)
    required: false
  task-amend:
    description: Additional text appended to the task prompt for steering
    required: false
  mcp-server:
    description: "MCP service name to connect to (e.g. guide); adds mcp__<name>__* to allowed tools"
    required: false
  discussion-id:
    description: Stable id for the threaded discussion (discuss mode); carried through traces for linking and used by callers to resume a suspended run
    required: false
  resume-context:
    description: JSON-serialized prior state for a resumed discuss run (discuss mode)
    required: false
  trace:
    description: Enable trace capture and artifact upload
    required: false
    default: "true"
  timeout-minutes:
    description: Maximum minutes the agent step may run before being cancelled
    required: false
    default: "45"
  case:
    description: Case identifier embedded in trace artifact filenames (use the matrix case id for matrix runs; defaults to "default")
    required: false
    default: "default"

outputs:
  trace-dir:
    description: |
      Absolute path of the mktemp directory holding all trace files for this
      run (empty when `trace` is disabled). Use this to read or post-process
      the raw or split trace files from subsequent workflow steps without
      globbing `/tmp`.
    value: ${{ steps.setup.outputs.trace-dir }}
  trace-file:
    description: |
      Absolute path of the raw NDJSON trace file
      (`<trace-dir>/trace--<case>.raw.ndjson`). Empty when `trace` is
      disabled. Wraps each agent/supervisor/facilitator/chair/orchestrator
      event in `{source, seq, event}` envelopes; downstream tooling that
      needs the structured envelope (e.g. extracting the orchestrator
      summary) should read this path directly.
    value: ${{ steps.setup.outputs.trace-file }}
  case:
    description: Effective case identifier (the `case` input, or "default").
    value: ${{ steps.setup.outputs.case }}

runs:
  using: composite
  steps:
    - name: Setup trace directory
      if: inputs.trace == 'true'
      id: setup
      shell: bash
      env:
        CASE: ${{ inputs.case }}
      run: |
        TRACE_DIR=$(mktemp -d)
        CASE="${CASE:-default}"
        # Publish the trace dir, effective case, and raw trace file path so
        # downstream steps read them without globbing /tmp. The trace-file path
        # is kept in sync with the --output passed in "Run fit-harness".
        {
          echo "trace-dir=$TRACE_DIR"
          echo "case=$CASE"
          echo "trace-file=$TRACE_DIR/trace--$CASE.raw.ndjson"
        } >> "$GITHUB_OUTPUT"

    - name: Run fit-harness
      shell: bash
      env:
        # The agent runs in bypass-permissions mode
        # (--dangerously-skip-permissions), which Claude Code refuses under
        # uid 0 unless the process is marked sandboxed. CI containers may run
        # as root, so mark the run sandboxed; the SDK forwards this env to the
        # spawned Claude Code process. Harmless on non-root runners. Without it
        # the agent exits 1 with no output before its first turn.
        IS_SANDBOX: "1"
        MODE: ${{ inputs.mode }}
        TASK_FILE: ${{ inputs.task-file }}
        TASK_TEXT: ${{ inputs.task-text }}
        TASK_EVENT: ${{ inputs.task-event }}
        CWD: ${{ inputs.cwd }}
        SUPERVISOR_CWD: ${{ inputs.supervisor-cwd }}
        AGENT_CWD: ${{ inputs.agent-cwd }}
        AGENT_MODEL: ${{ inputs.agent-model }}
        LEAD_MODEL: ${{ inputs.lead-model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        TOOLS: ${{ inputs.allowed-tools }}
        SUPERVISOR_TOOLS: ${{ inputs.supervisor-allowed-tools }}
        LEAD_PROFILE: ${{ inputs.lead-profile }}
        AGENT_PROFILE: ${{ inputs.agent-profile }}
        AGENT_PROFILES: ${{ inputs.agent-profiles }}
        TASK_AMEND: ${{ inputs.task-amend }}
        MCP_SERVER: ${{ inputs.mcp-server }}
        DISCUSSION_ID: ${{ inputs.discussion-id }}
        RESUME_CONTEXT: ${{ inputs.resume-context }}
        TRACE_ENABLED: ${{ inputs.trace }}
        TRACE_DIR: ${{ steps.setup.outputs.trace-dir }}
        TRACE_CASE: ${{ steps.setup.outputs.case }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        # fit-harness + fit-trace are pinned gear binaries on PATH, installed by
        # forwardimpact/bootstrap (clis: fit-harness fit-trace) — assumed present.
        #
        # Flags accepted by every mode. Empty values are forwarded verbatim: the
        # CLI treats an empty flag as unset and falls back to its own default, so
        # no per-flag `if [ -n ]` guards are needed. The CLI also enforces
        # task-source mutual exclusivity (exactly one of file/text/event), so the
        # workflow just forwards all three and lets it select.
        base=(
          "--task-file=$TASK_FILE"
          "--task-text=$TASK_TEXT"
          "--task-event=$TASK_EVENT"
          "--task-amend=$TASK_AMEND"
          "--agent-model=$AGENT_MODEL"
          "--max-turns=$MAX_TURNS"
        )
        if [ "$TRACE_ENABLED" = "true" ] && [ -n "$TRACE_DIR" ]; then
          base+=("--output=$TRACE_DIR/trace--${TRACE_CASE}.raw.ndjson")
        fi

        # Composite action steps can't use the GitHub `timeout-minutes` field, so
        # enforce the cap with the shell `timeout` command. One branch per mode —
        # each subcommand declares its own flag set, so the flags are scoped to
        # the mode that accepts them.
        case "$MODE" in
          supervise)
            timeout "${TIMEOUT_MINUTES}m" fit-harness supervise \
              --supervisor-cwd="$SUPERVISOR_CWD" \
              --agent-cwd="$AGENT_CWD" \
              --allowed-tools="$TOOLS" \
              --supervisor-allowed-tools="$SUPERVISOR_TOOLS" \
              --lead-profile="$LEAD_PROFILE" \
              --lead-model="$LEAD_MODEL" \
              --agent-profile="$AGENT_PROFILE" \
              --mcp-server="$MCP_SERVER" \
              "${base[@]}"
            ;;
          facilitate)
            timeout "${TIMEOUT_MINUTES}m" fit-harness facilitate \
              --facilitator-cwd="." \
              --agent-profiles="$AGENT_PROFILES" \
              --agent-cwd="$AGENT_CWD" \
              --lead-profile="$LEAD_PROFILE" \
              --lead-model="$LEAD_MODEL" \
              "${base[@]}"
            ;;
          discuss)
            timeout "${TIMEOUT_MINUTES}m" fit-harness discuss \
              --agent-cwd="$AGENT_CWD" \
              --agent-profiles="$AGENT_PROFILES" \
              --lead-profile="$LEAD_PROFILE" \
              --lead-model="$LEAD_MODEL" \
              --discussion-id="$DISCUSSION_ID" \
              --resume-context="$RESUME_CONTEXT" \
              "${base[@]}"
            ;;
          *)
            timeout "${TIMEOUT_MINUTES}m" fit-harness run \
              --cwd="$CWD" \
              --allowed-tools="$TOOLS" \
              --agent-profile="$AGENT_PROFILE" \
              --mcp-server="$MCP_SERVER" \
              "${base[@]}"
            ;;
        esac

    - name: Split trace
      if: always() && inputs.trace == 'true' && steps.setup.outputs.trace-dir != ''
      shell: bash
      env:
        TRACE_DIR: ${{ steps.setup.outputs.trace-dir }}
        MODE: ${{ inputs.mode }}
        TRACE_CASE: ${{ steps.setup.outputs.case }}
      run: |
        # fit-trace accepts `discuss` directly (it buckets by envelope source,
        # mapping discuss onto the facilitate shape internally), so the mode is
        # forwarded as-is.
        fit-trace split "$TRACE_DIR/trace--${TRACE_CASE}.raw.ndjson" \
          --mode="$MODE" \
          --case="$TRACE_CASE" \
          --output-dir="$TRACE_DIR"

    - name: Upload trace bundle
      if: always() && inputs.trace == 'true' && steps.setup.outputs.trace-dir != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: trace--${{ steps.setup.outputs.case }}
        path: ${{ steps.setup.outputs.trace-dir }}/trace--*.ndjson
