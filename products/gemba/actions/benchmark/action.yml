name: FIT Benchmark
description: Run coding-agent benchmarks via the gemba-benchmark CLI — task-family execution, in-process concurrency, cross-machine sharding, pass@k reporting, and result upload

inputs:
  family:
    description: Path or git URL to a task family
    required: true
  output:
    description: Run-output directory (created if missing)
    required: false
    default: "benchmark-runs"
  runs:
    description: Runs per task (integer >= 1)
    required: false
    default: "5"
  agent-model:
    description: Claude model for the agent-under-test; empty uses the gemba-benchmark CLI default
    required: false
    default: ""
  lead-model:
    description: Claude model for the lead role; empty uses the gemba-benchmark CLI default
    required: false
    default: ""
  judge-model:
    description: Claude model for the judge; empty uses the gemba-benchmark CLI default
    required: false
    default: ""
  agent-profile:
    description: Agent-under-test profile name
    required: false
  judge-profile:
    description: Judge profile name
    required: false
  max-turns:
    description: Agent turn budget (0 = unlimited)
    required: false
    default: "50"
  allowed-tools:
    description: Comma-separated list of allowed tools for the agent-under-test
    required: false
    default: "Bash,Read,Glob,Grep,Write,Edit,Agent,TodoWrite"
  concurrency:
    description: Max cells run concurrently in-process; empty uses the gemba-benchmark CLI default (CPU-aware, on by default)
    required: false
    default: ""
  shard-index:
    description: 1-based shard index for cross-machine sharding (run mode). 1 with shard-total 1 is the whole family.
    required: false
    default: "1"
  shard-total:
    description: Total shard count for cross-machine sharding (run mode). 1 runs the whole family in one job.
    required: false
    default: "1"
  mode:
    description: "run (default): execute one shard and upload its partial ledger. merge: download every shard's partial ledger and aggregate one combined pass@k report."
    required: false
    default: "run"
  merge-input:
    description: Directory the shard partial ledgers are downloaded into before merging (merge mode)
    required: false
    default: "benchmark-merge"
  k:
    description: Comma-separated k values for pass@k
    required: false
    default: "1,3,5"
  format:
    description: Report output format (json or text)
    required: false
    default: "text"
  summary:
    description: Append text report to GITHUB_STEP_SUMMARY after the run
    required: false
    default: "true"
  summary-detail:
    description: "Verbosity of the run-mode step summary (full|compact). compact renders status + pass@k only; merge mode always renders full."
    required: false
    default: "full"
  upload-results:
    description: Upload results.jsonl as a workflow artifact
    required: false
    default: "true"
  artifact-name:
    description: Name for the uploaded results artifact (run mode with shard-total > 1 uploads benchmark-shard-<shard-index> instead, so a matrix never collides)
    required: false
    default: "benchmark-results"
  timeout-minutes:
    description: Maximum minutes the run step may execute before cancellation
    required: false
    default: "60"

outputs:
  results-path:
    description: Absolute path to results.jsonl (run mode)
    value: ${{ steps.resolve-paths.outputs.results-path }}

runs:
  using: composite
  steps:
    # --- run mode: execute one shard ----------------------------------------
    - name: Install apm
      if: inputs.mode == 'run'
      shell: bash
      env:
        GEAR_RELEASE: gear@v0.3.0
      run: |
        # The released installer owns the pinned, SHA-verified apm version, so
        # this action carries no duplicate pin. bootstrap usually provides apm
        # already; the guard skips the download then.
        if command -v apm &>/dev/null; then
          echo "apm already available: $(apm --version)"
        else
          curl -fsSL "https://github.com/forwardimpact/monorepo/releases/download/${GEAR_RELEASE}/fit-install.sh" \
            | bash -s -- --only apm
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        fi

    - name: Resolve paths
      if: inputs.mode == 'run'
      id: resolve-paths
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
        SHARD_INDEX: ${{ inputs.shard-index }}
        SHARD_TOTAL: ${{ inputs.shard-total }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        mkdir -p "$OUTPUT_DIR"
        echo "results-path=$(realpath "$OUTPUT_DIR")/results.jsonl" >> "$GITHUB_OUTPUT"
        # Shard-scope the artifact name so a matrix of shards never collides on
        # upload; an unsharded run (shard-total 1) keeps the caller's name.
        if [ "$SHARD_TOTAL" != "1" ]; then
          echo "artifact-name=benchmark-shard-${SHARD_INDEX}" >> "$GITHUB_OUTPUT"
        else
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
        fi

    - name: Run benchmark
      if: inputs.mode == 'run'
      shell: bash
      env:
        # The agent-under-test runs in bypass-permissions mode
        # (--dangerously-skip-permissions), which Claude Code refuses under
        # uid 0 unless the process is marked sandboxed. CI containers may run
        # as root, so mark the run sandboxed; the SDK forwards this env to the
        # spawned Claude Code process. Harmless on non-root runners.
        IS_SANDBOX: "1"
        FAMILY: ${{ inputs.family }}
        OUTPUT_DIR: ${{ inputs.output }}
        RUNS: ${{ inputs.runs }}
        AGENT_MODEL: ${{ inputs.agent-model }}
        LEAD_MODEL: ${{ inputs.lead-model }}
        JUDGE_MODEL: ${{ inputs.judge-model }}
        AGENT_PROFILE: ${{ inputs.agent-profile }}
        JUDGE_PROFILE: ${{ inputs.judge-profile }}
        MAX_TURNS: ${{ inputs.max-turns }}
        TOOLS: ${{ inputs.allowed-tools }}
        CONCURRENCY: ${{ inputs.concurrency }}
        SHARD_INDEX: ${{ inputs.shard-index }}
        SHARD_TOTAL: ${{ inputs.shard-total }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        # gemba-benchmark is a pinned gear binary on PATH, installed by
        # forwardimpact/bootstrap (clis: gemba-benchmark) — assumed present.
        args=()
        args+=("--family=$FAMILY")
        args+=("--output=$OUTPUT_DIR")
        args+=("--runs=$RUNS")
        # Model flags are omitted when empty so the CLI defaults
        # (@forwardimpact/libutil/models) stay the single source of truth.
        if [ -n "$AGENT_MODEL" ]; then
          args+=("--agent-model=$AGENT_MODEL")
        fi
        if [ -n "$LEAD_MODEL" ]; then
          args+=("--lead-model=$LEAD_MODEL")
        fi
        if [ -n "$JUDGE_MODEL" ]; then
          args+=("--judge-model=$JUDGE_MODEL")
        fi
        args+=("--max-turns=$MAX_TURNS")
        args+=("--allowed-tools=$TOOLS")
        # Concurrency is on by default in the CLI; pass the flag only when set.
        if [ -n "$CONCURRENCY" ]; then
          args+=("--concurrency=$CONCURRENCY")
        fi
        # Always pass --shard; shard-index/shard-total default to 1/1, the
        # identity case that runs the whole family.
        args+=("--shard=${SHARD_INDEX}/${SHARD_TOTAL}")

        if [ -n "$AGENT_PROFILE" ]; then
          args+=("--agent-profile=$AGENT_PROFILE")
        fi
        if [ -n "$JUDGE_PROFILE" ]; then
          args+=("--judge-profile=$JUDGE_PROFILE")
        fi

        timeout "${TIMEOUT_MINUTES}m" gemba-benchmark run "${args[@]}"

    - name: Report (run)
      if: always() && inputs.mode == 'run' && inputs.summary == 'true'
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output }}
        K_VALUES: ${{ inputs.k }}
        FORMAT: ${{ inputs.format }}
        SUMMARY_DETAIL: ${{ inputs.summary-detail }}
      run: |
        RESULTS="$OUTPUT_DIR/results.jsonl"
        if [ ! -s "$RESULTS" ]; then
          echo "::warning::results.jsonl missing or empty — skipping summary"
          exit 0
        fi

        # A sharded run passes summary-detail=compact so each shard emits a
        # short status + pass@k summary; the merge job renders the full report.
        gemba-benchmark report \
          --input="$OUTPUT_DIR" \
          --k="$K_VALUES" \
          --format="$FORMAT" \
          --detail="$SUMMARY_DETAIL" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload shard results
      if: always() && inputs.mode == 'run' && inputs.upload-results == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ steps.resolve-paths.outputs.artifact-name }}
        path: ${{ inputs.output }}/results.jsonl
        if-no-files-found: warn

    # --- merge mode: aggregate every shard's partial ledger -----------------
    - name: Download shard ledgers
      if: inputs.mode == 'merge'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: benchmark-shard-*
        path: ${{ inputs.merge-input }}

    - name: Merge report
      if: inputs.mode == 'merge'
      shell: bash
      env:
        MERGE_INPUT: ${{ inputs.merge-input }}
        K_VALUES: ${{ inputs.k }}
        FORMAT: ${{ inputs.format }}
        SUMMARY: ${{ inputs.summary }}
      run: |
        # report --input discovers every results.jsonl under the directory
        # recursively and unions them — one combined pass@k over all shards.
        if [ "$SUMMARY" = "true" ]; then
          gemba-benchmark report \
            --input="$MERGE_INPUT" \
            --k="$K_VALUES" \
            --format="$FORMAT" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Produce one combined results.jsonl for the merged artifact.
        mkdir -p combined-results
        : > combined-results/results.jsonl
        find "$MERGE_INPUT" -name results.jsonl -exec cat {} + >> combined-results/results.jsonl || true

    - name: Upload combined results
      if: inputs.mode == 'merge' && inputs.upload-results == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.artifact-name }}
        path: combined-results/results.jsonl
        if-no-files-found: warn
