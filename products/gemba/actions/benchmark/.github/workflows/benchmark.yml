name: FIT Benchmark (sharded)

# Reusable workflow: fan a gemba-benchmark family across N machines and merge the
# partial ledgers into one pass@k. A consumer gets cross-machine parallelism
# from a single `shard-total` input. Each shard runs Layer-1 in-process
# concurrency internally, so effective parallelism is shard-total × per-machine
# concurrency. The merge job carries no agent scaffold — only the report CLI.

on:
  workflow_call:
    inputs:
      family:
        description: Path or git URL to a task family
        required: true
        type: string
      runs:
        description: Runs per task (integer >= 1)
        required: false
        type: string
        default: "5"
      max-turns:
        description: Agent turn budget (0 = unlimited)
        required: false
        type: string
        default: "50"
      judge-profile:
        description: Judge profile name
        required: false
        type: string
        default: ""
      agent-profile:
        description: Agent-under-test profile name
        required: false
        type: string
        default: ""
      agent-model:
        description: Claude model for the agent-under-test; empty uses the CLI default
        required: false
        type: string
        default: ""
      lead-model:
        description: Claude model for the lead role; empty uses the CLI default
        required: false
        type: string
        default: ""
      judge-model:
        description: Claude model for the judge; empty uses the CLI default
        required: false
        type: string
        default: ""
      concurrency:
        description: Max cells run concurrently per shard; empty uses the CLI default (on by default)
        required: false
        type: string
        default: ""
      shard-total:
        description: Number of machines to fan across. 1 runs the whole family in one job.
        required: false
        type: string
        default: "1"
      k:
        description: Comma-separated k values for pass@k
        required: false
        type: string
        default: "1,3,5"
      format:
        description: Report output format (json or text)
        required: false
        type: string
        default: "text"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  # Emit [1, 2, …, shard-total] so the shard job can matrix over it.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - name: Compute shard list
        id: gen
        shell: bash
        env:
          SHARD_TOTAL: ${{ inputs.shard-total }}
        run: |
          set -euo pipefail
          n="$SHARD_TOTAL"
          if ! [[ "$n" =~ ^[0-9]+$ ]] || [ "$n" -lt 1 ]; then
            echo "::error::shard-total must be a positive integer (got '$n')"
            exit 1
          fi
          json="[$(seq 1 "$n" | paste -sd, -)]"
          echo "shards=$json" >> "$GITHUB_OUTPUT"
          echo "Fanning across $n shard(s): $json"

  # One job per shard: full benchmark environment, run this shard's cells,
  # upload its partial ledger as benchmark-shard-<i>.
  shard:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shards) }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # The benchmark agent coordinates work-tracking through the filesystem
      # tracker in headless CI (no GitHub work-tracker token is minted). The
      # agent SDK inherits this from the job env; gemba-benchmark resolves it
      # (flag > env > github default). Carried as the reusable workflow's env
      # contract rather than a workflow input.
      LIBHARNESS_WORK_TRACKER: filesystem
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: forwardimpact/bootstrap@4e63230e2a638296a6c201c91f724784e1958f5c # v1.0.4
        with:
          # gemba-benchmark runs the benchmark binary straight off PATH — the
          # action has no bunx/npx fallback. Requires a bootstrap pin whose
          # gear release publishes the gemba-* binaries.
          clis: gemba-benchmark
      - uses: forwardimpact/benchmark@v1.0.2
        with:
          mode: run
          family: ${{ inputs.family }}
          runs: ${{ inputs.runs }}
          max-turns: ${{ inputs.max-turns }}
          judge-profile: ${{ inputs.judge-profile }}
          agent-profile: ${{ inputs.agent-profile }}
          agent-model: ${{ inputs.agent-model }}
          lead-model: ${{ inputs.lead-model }}
          judge-model: ${{ inputs.judge-model }}
          concurrency: ${{ inputs.concurrency }}
          shard-index: ${{ matrix.shard }}
          shard-total: ${{ inputs.shard-total }}
          k: ${{ inputs.k }}
          format: ${{ inputs.format }}
          # Each shard emits a short status + pass@k summary; the merge job
          # renders the full report over the combined ledger.
          summary-detail: compact

  # Merge job: no agent scaffold — only Node for the report CLI. Download every
  # shard's partial ledger and aggregate one combined pass@k report.
  merge:
    needs: shard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: forwardimpact/benchmark@v1.0.2
        with:
          mode: merge
          # family is a required action input but unused in merge mode.
          family: ${{ inputs.family }}
          k: ${{ inputs.k }}
          format: ${{ inputs.format }}
