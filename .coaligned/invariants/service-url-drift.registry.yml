# Service URL-default source-of-truth registry.
#
# Each service's listen URL is declared in its createServiceConfig manifest
# (protocol+port; host stays the bind-default 0.0.0.0, except ghserver which
# keeps host: 127.0.0.1 per its bind-guard). The service-url-drift invariant
# asserts every consumer surface below restates the URL the manifest produces,
# normalizing 0.0.0.0 / localhost / 127.0.0.1 / <name>.guide.local.
#
# Consumer kinds:
#   env   — a SERVICE_<NAME>_URL= line in an .env.*.example (commented or not)
#   init  — the SERVICE_<NAME>_URL: literal in products/guide init.js env block
#   docs  — a code-block / curl URL on a docs page, pinned by `pattern`
#
# Out of registry by design: _CALLBACK_BASE_URL /
# _LINK_BASE_URL (per-deployment, no in-repo default); the docker-host
# embedding row `grpc://embedding.local:3015` (deployment hostname); free-prose
# port mentions; service README "Listen URL" rows (not one of the four surface
# kinds — kept consistent by hand when a manifest port changes, not gated).

services:
  span:
    manifest: services/span/server.js
    consumers:
      - { kind: env, path: .env.local.example }
      - { kind: env, path: .env.docker-native.example }
      - { kind: env, path: .env.docker-supabase.example }
      - { kind: init, path: products/guide/src/commands/init.js }
  vector:
    manifest: services/vector/server.js
    consumers:
      - { kind: env, path: .env.local.example }
      - { kind: env, path: .env.docker-native.example }
      - { kind: env, path: .env.docker-supabase.example }
      - { kind: init, path: products/guide/src/commands/init.js }
  graph:
