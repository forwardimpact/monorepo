syntax = "proto3";

package bridge;

import "common.proto";

service Bridge {
  rpc LoadDiscussion(LoadDiscussionRequest) returns (Discussion);
  rpc LoadDiscussionByCorrelation(LoadByCorrelationRequest) returns (Discussion);
  rpc ListOpenRecesses(ListOpenRecessesRequest) returns (OpenRecessList);
  rpc SaveDiscussion(Discussion) returns (common.Empty);
  rpc HasOrigin(OriginKey) returns (HasOriginResponse);
  rpc RecordOrigin(Origin) returns (common.Empty);
  rpc Sweep(SweepRequest) returns (SweepResponse);
  rpc PutPendingDispatch(PutPendingDispatchRequest) returns (common.Empty);
  rpc ResolvePendingDispatch(ResolvePendingDispatchRequest) returns (PendingDispatch);
  rpc VerifyPendingDispatch(VerifyPendingDispatchRequest) returns (common.Empty);
  rpc EnqueueInbox(EnqueueInboxRequest) returns (common.Empty);
  rpc DrainInbox(DrainInboxRequest) returns (InboxMessages);
}

message Discussion {
  string id = 1;
  string channel = 2;
  string discussion_id = 3;
  string lead = 4;
  int64 last_active_at = 5;
  repeated int64 dispatches = 6;
  repeated HistoryEntry history = 7;
  repeated Participant participants = 8;
  map<string, OpenRfc> open_rfcs = 9;
  map<string, string> pending_callbacks = 10;
  optional string active_requester = 11;
  int64 last_posted_seq = 12;
  string tenant_id = 13;
  // The channel-scoped tenant key (e.g. GitHub install/repo key, Entra tid)
  // the bridge resolved this discussion's tenant from. Persisted so a
  // re-dispatch (inbox reconcile, elapsed resume) can re-resolve the active
  // tenant without the original inbound payload. Empty in single-tenant mode.
  string channel_tenant_key = 14;
}

message HistoryEntry { string role = 1; string text = 2; optional string author = 3; }
message Participant {
  string name = 1; string kind = 2;
  optional string external_id = 3; string metadata_json = 4;
}
message ResumeTrigger {
  string kind = 1;
  optional int64 replies = 2;
  optional string elapsed = 3;
}
message OpenRfc {
  ResumeTrigger trigger = 1;
  int64 opened_at = 2;
  int64 history_index_at_open = 3;
  optional int64 due_at = 4;
  optional string requester = 5;
}
message Origin { string id = 1; string discussion_id = 2; int64 posted_at = 3; string tenant_id = 4; }

message LoadDiscussionRequest { string channel = 1; string discussion_id = 2; string tenant_id = 3; }
message LoadByCorrelationRequest { string correlation_id = 1; string tenant_id = 2; }
message OriginKey { string id = 1; string tenant_id = 2; }
message HasOriginResponse { bool exists = 1; }
message OpenRecessRef { string correlation_id = 1; int64 due_at = 2; string tenant_id = 3; }
message OpenRecessList { repeated OpenRecessRef refs = 1; }
message ListOpenRecessesRequest { string tenant_id = 1; }
message PendingDispatch {
  string link_token = 1;
  string surface = 2;
  string surface_user_id = 3;
  string discussion_id = 4;
  int64 created_at = 5;
}

message PutPendingDispatchRequest { PendingDispatch pending = 1; string tenant_id = 2; }
message ResolvePendingDispatchRequest {
  string link_token = 1;
  string tenant_id = 2;
  optional string expected_surface_user_id = 3;
}

message VerifyPendingDispatchRequest {
  string link_token = 1;
  string expected_surface = 2;
  string expected_surface_user_id = 3;
  string tenant_id = 4;
}

message SweepRequest { optional int64 now = 1; string tenant_id = 2; }
message SweepResponse { int32 evicted_discussions = 1; int32 evicted_origins = 2; int32 evicted_pending = 3; }

message InboxMessage {
  string correlation_id = 1;
  int64 seq = 2;
  string text = 3;
  string author = 4;
  int64 enqueued_at = 5;
}

message EnqueueInboxRequest { InboxMessage message = 1; string tenant_id = 2; }
message DrainInboxRequest { string correlation_id = 1; int64 since_seq = 2; string tenant_id = 3; }
message InboxMessages { repeated InboxMessage messages = 1; }
