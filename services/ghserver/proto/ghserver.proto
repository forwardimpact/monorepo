syntax = "proto3";

package ghserver;

import "common.proto";

service Ghserver {
  rpc MintInstallationToken(MintRequest) returns (MintResponse);
}

message MintRequest {
  string owner = 1;
  string name = 2;
  string requested_by = 3;
}

message MintResponse {
  string installation_token = 1;
  int64 expires_at = 2;
}
