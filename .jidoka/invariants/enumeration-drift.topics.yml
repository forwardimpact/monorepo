# Enumeration-drift registry — the single source of truth for the
# enumeration-drift invariant (.jidoka/invariants/enumeration-drift.rules.mjs).
#
# Each topic names an authoritative `source` (a typed selector) and the
# `consumers[]` that restate it today, with the property each consumer commits
# to: `count`, `list`, or `both`. Adding a 7th topic of an existing source kind
# is a one-file edit here — no probe code changes.
#
# Source kinds:
#   - fs-glob:  pattern (root-anchored, no `..`/absolute), `id` derivation
#               (`dirname` | `basename` | `basename-noext`), optional `exclude`
#               (exact basenames).
#   - md-table: file + section heading + column + row `filter` regex.
#
# Refresh the canonical fence bodies for the consumers:
#   bunx jidoka invariants --seed enumeration-drift
topics:
  - id: services-tree
    source: { type: fs-glob, pattern: "services/*/package.json", id: dirname }
    consumers:
      - { path: "websites/fit/docs/getting-started/contributors/index.md", property: list }
      - { path: "websites/fit/gear/index.md", property: count }
  - id: libraries-list
    source: { type: fs-glob, pattern: "libraries/lib*/package.json", id: dirname }
    consumers:
      - { path: "websites/fit/gear/index.md", property: count }
  - id: sibling-composite-actions
    source: { type: md-table, file: ".github/CLAUDE.md", section: "Third-party actions", column: "Action (`@v1`)", filter: "forwardimpact/" }
    consumers:
      - { path: "CLAUDE.md", property: list }
      - { path: "KATA.md", property: both }
      - { path: ".github/CLAUDE.md", property: count }
  - id: published-skills
    source: { type: fs-glob, pattern: ".claude/skills/kata-*/SKILL.md", id: dirname }
    consumers:
      - { path: "KATA.md", property: list }
      - { path: "websites/kata/index.md", property: count }
      - { path: "websites/kata/llms.txt", property: count }
  - id: products-tree
    source: { type: fs-glob, pattern: "products/*/package.json", id: dirname }
    consumers:
      - { path: "CONTRIBUTING.md", property: list }
      - { path: "websites/fit/docs/getting-started/contributors/index.md", property: both }
  - id: kata-workflows
    source: { type: fs-glob, pattern: ".github/workflows/kata-*.yml", id: basename-noext, exclude: ["kata-interview.yml"] }
    consumers:
      - { path: "KATA.md", property: list }
